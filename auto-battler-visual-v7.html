<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Auto Battler Visual V7</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07100b;color:#f6e7bd;font-family:Georgia,system-ui,sans-serif;touch-action:none}button{font:inherit;color:inherit}#app{position:fixed;inset:0;background:radial-gradient(circle at 50% 40%,#617b48 0 28%,#263f2d 56%,#08110c 87%)}#app:before{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 8% 25%,#183322 0 11%,transparent 12%),radial-gradient(circle at 93% 30%,#183322 0 13%,transparent 14%),linear-gradient(90deg,#06100acc 0 7%,transparent 14% 86%,#06100acc 93%)}.panel{background:linear-gradient(#151714e8,#0c0e0de8);border:2px solid #8d6b35;border-radius:12px;box-shadow:0 5px 18px #000b,inset 0 0 0 1px #c9a86633}#top{position:absolute;left:10px;right:10px;top:7px;height:45px;display:flex;align-items:center;gap:8px;z-index:30}.crest{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle,#375f8f,#13243a);border:3px solid #b68d42;font-size:24px}.pill{height:37px;padding:7px 12px;display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;background:#11130fe8;border:2px solid #806234;border-radius:19px}.grow{flex:1}.ctrl{height:37px;min-width:42px;padding:0 11px;border:2px solid #806234;border-radius:8px;background:#14130f;font-weight:900}.wave{position:absolute;left:50%;top:0;transform:translateX(-50%);z-index:31;text-align:center;padding:5px 26px 8px;border-radius:0 0 22px 22px;background:#17140f;border:2px solid #8d6b35;border-top:0;font-weight:900}.wave b{display:block;font-size:18px}.wave span{display:block;font-size:11px}.side{position:absolute;top:60px;bottom:172px;width:132px;z-index:22;padding:9px}.side h3{margin:0 0 7px;text-align:center;font-size:14px;color:#ffe5a1}.side.left{left:8px}.side.right{right:8px}.syn{display:flex;align-items:center;gap:8px;padding:7px 2px;border-bottom:1px solid #5e4728;font-size:11px}.ico{width:25px;height:25px;border-radius:50%;display:grid;place-items:center;background:#493820;border:1px solid #a67c39}.member{display:grid;grid-template-columns:30px 1fr 26px;gap:5px;align-items:center;margin:5px 0}.avatar{width:30px;height:30px;border-radius:7px;border:1px solid #aa8242;background:linear-gradient(145deg,#795838,#2b2118);display:grid;place-items:center;font-size:18px}.bars{height:17px}.hp,.mp{height:6px;border-radius:4px;background:#27231b;margin:2px 0;overflow:hidden}.hp i{display:block;height:100%;background:#63d45f}.mp i{display:block;height:100%;background:#4aa6df}.num{font-size:10px;text-align:right}.arenaFrame{position:absolute;left:145px;right:145px;top:58px;bottom:170px;border-radius:24px;background:linear-gradient(135deg,#355335,#162a1d);border:10px solid #4b4d39;box-shadow:0 15px 35px #000b,inset 0 0 0 3px #b6aa7b55;overflow:hidden}.decor{position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 6% 84%,#4cc2ff77 0 2%,transparent 3%),radial-gradient(circle at 95% 22%,#4cc2ff55 0 2%,transparent 3%),linear-gradient(90deg,#102318 0 5%,transparent 12% 88%,#102318 95%)}.tree{position:absolute;width:70px;height:90px;background:linear-gradient(#315f31,#16331e);clip-path:polygon(50% 0,72% 30%,62% 30%,84% 58%,67% 58%,96% 88%,4% 88%,33% 58%,16% 58%,38% 30%,28% 30%);filter:drop-shadow(0 8px 5px #0008)}.t1{left:5px;top:5px}.t2{right:8px;top:6px}.t3{left:12px;bottom:0}.t4{right:10px;bottom:0}#board{position:absolute;left:10%;right:10%;top:8%;bottom:9%;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);transform:perspective(950px) rotateX(46deg);transform-origin:center;border:7px solid #a3987555;border-radius:18px;overflow:hidden;background:#827657}.cell{position:relative;border:1px solid #d7c99d44;background:#8b825f66}.cell:nth-child(odd){background:#7a775766}.cell.player{box-shadow:inset 0 0 0 2px #74e69d55}.cell.over{background:#c0d36d99;box-shadow:inset 0 0 0 3px #ffe87a}.unit{position:absolute;left:3%;bottom:2%;width:94%;height:125%;z-index:5;transform:rotateX(-46deg);transform-origin:bottom center;filter:drop-shadow(0 7px 4px #000b);animation:idle .9s ease-in-out infinite alternate}.unit svg{width:100%;height:100%;overflow:visible}.unit.enemy{filter:drop-shadow(0 7px 5px #600b)}.unit.attack{animation:attack .32s}.unit.hit{animation:hit .18s 2}.unit.dead{animation:dead .5s forwards}.uBar{position:absolute;left:8%;right:8%;top:-4px;height:5px;background:#351010;border:1px solid #000;transform:rotateX(-46deg);z-index:7}.uBar i{display:block;height:100%;background:#5ad766}.enemy .uBar i{background:#e5534c}@keyframes idle{to{transform:rotateX(-46deg) translateY(-4px)}}@keyframes attack{50%{transform:rotateX(-46deg) translateY(-13px) scale(1.14)}}@keyframes hit{50%{filter:brightness(2) drop-shadow(0 0 10px white)}}@keyframes dead{to{opacity:0;transform:rotateX(-46deg) translateY(18px) scale(.3)}}#bench{position:absolute;left:50%;bottom:94px;transform:translateX(-50%);z-index:35;display:grid;grid-template-columns:repeat(6,58px);gap:5px;padding:6px;border:2px solid #8b6935;border-radius:13px;background:#13120edd;box-shadow:0 7px 18px #000}.slot{width:58px;height:60px;border:2px solid #5e492c;border-radius:50% 50% 12px 12px;background:radial-gradient(circle at 50% 70%,#4b4a40,#1b1812 65%);position:relative;overflow:visible}.slot.filled{border-color:#bd9349}.slot.selected{border-color:#ffe06c;box-shadow:0 0 12px #ffd75e}.slot svg{position:absolute;left:3%;top:-15%;width:94%;height:105%}.slot b{position:absolute;left:1px;right:1px;bottom:0;background:#000b;text-align:center;font-size:8px;border-radius:0 0 8px 8px}#bottom{position:absolute;left:0;right:0;bottom:0;height:90px;z-index:27;background:#090907f2;border-top:2px solid #6f552e;padding:5px 150px}.shop{height:100%;display:grid;grid-template-columns:repeat(5,minmax(70px,1fr));gap:5px;max-width:760px;margin:auto}.card{position:relative;border:2px solid #7d6438;border-radius:8px;background:linear-gradient(#252a2c,#121618);padding:3px;color:#f1deb0;text-align:center;overflow:hidden}.portrait{height:48px;border-radius:6px;background:linear-gradient(#496545,#1d3023);overflow:hidden}.portrait svg{width:100%;height:100%}.card .name{font-size:11px;font-weight:900}.card small{display:block;font-size:8px}.card button{position:absolute;right:3px;bottom:3px;border:0;border-radius:12px;background:#bd8d2f;padding:3px 7px;font-size:9px;font-weight:900}.bigBtn{position:absolute;bottom:8px;width:122px;height:75px;border-radius:50%;border:4px solid #8d6a32;background:radial-gradient(circle,#503716,#1c140c 72%);color:#ffe5a0;font-weight:900;z-index:40;box-shadow:0 4px 12px #000}.bigBtn.left{left:12px}.bigBtn.right{right:12px}#start{position:absolute;right:14px;bottom:88px;z-index:40;border:2px solid #a97d32;border-radius:10px;background:#bc8b2d;color:#21170b;padding:9px 16px;font-weight:900}.ghost{position:fixed;width:64px;height:74px;z-index:100;pointer-events:none;transform:translate(-50%,-65%);filter:drop-shadow(0 7px 5px #000b)}.ghost svg{width:100%;height:100%}.toast{position:absolute;left:50%;top:26%;transform:translate(-50%,-50%) scale(.8);opacity:0;z-index:60;padding:12px 20px;border:2px solid #e0bd60;border-radius:13px;background:#16130ff2;font-weight:900;transition:.18s}.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}@media(max-width:850px){.side{width:105px;padding:6px}.arenaFrame{left:112px;right:112px}.syn{font-size:9px;padding:5px 0}.member{grid-template-columns:25px 1fr 20px}.avatar{width:25px;height:25px}.bench{grid-template-columns:repeat(6,45px)}#bench{grid-template-columns:repeat(6,45px)}.slot{width:45px;height:48px}#bottom{padding-left:118px;padding-right:118px}.bigBtn{width:100px;height:67px;font-size:10px}.card .name{font-size:9px}.portrait{height:40px}}</style></head><body><div id="app"><div id="top"><div class="crest">⚔</div><div class="pill">Lv.<b id="lv">1</b><span>EXP <b id="xp">0/4</b></span></div><div class="pill">🪙 <b id="gold">3</b></div><div class="pill">💎 0</div><div class="pill">👥 <b id="used">0</b>/<b id="cap">1</b></div><div class="grow"></div><button class="ctrl">×1</button><button class="ctrl">AUTO</button><button class="ctrl">▥</button><button class="ctrl">⚙</button></div><div class="wave"><span>WAVE 1-1</span><b id="timer">30</b></div><aside class="side left panel"><h3>SYNERGY</h3><div class="syn"><span class="ico">⚔</span>Warrior 0/2</div><div class="syn"><span class="ico">🏹</span>Ranger 0/2</div><div class="syn"><span class="ico">🔮</span>Mage 0/2</div><div class="syn"><span class="ico">☠</span>Undead 0/2</div><div class="syn"><span class="ico">🐾</span>Beast 0/2</div><div class="syn"><span class="ico">🌲</span>Forest 0/2</div></aside><aside class="side right panel"><h3>TEAM</h3><div id="team"></div></aside><div class="arenaFrame"><div class="decor"><i class="tree t1"></i><i class="tree t2"></i><i class="tree t3"></i><i class="tree t4"></i></div><div id="board"></div></div><div id="bench"></div><button id="buyExp" class="bigBtn left">+4 EXP<br>BUY EXP<br>🪙4</button><button id="refresh" class="bigBtn right">REFRESH<br>🪙2</button><button id="start">เริ่มต่อสู้</button><div id="bottom"><div id="shop" class="shop"></div></div><div id="toast" class="toast"></div></div><script>const COL=['#4f7fc8','#4f8a54','#7352a7','#c99a58','#536878'];function heroSvg(i){const p=COL[i%COL.length],hair=['#6a3f25','#5e4722','#35234d','#d9b679','#333'][i%5],w=i===0?'<path d="M68 20l5 3-31 55-6-4z" fill="#e6edf0" stroke="#6d5225" stroke-width="2"/>':i===1?'<path d="M72 18c-17 5-22 32-18 58" fill="none" stroke="#d6b45e" stroke-width="4"/><path d="M70 19L48 77" stroke="#eee"/>':i===2?'<path d="M67 16l5 2-12 57-5-1z" fill="#3b2a20"/><circle cx="69" cy="17" r="9" fill="#a777ff" stroke="#e0bd5b" stroke-width="3"/>':'<path d="M67 17l5 2-11 56-5-1z" fill="#4f3822"/><circle cx="69" cy="18" r="8" fill="#6ddd86"/>';return `<svg viewBox="0 0 90 100"><ellipse cx="45" cy="91" rx="28" ry="7" fill="#0005"/>${w}<path d="M30 51Q45 39 60 51l7 34H23z" fill="${p}" stroke="#d7b75b" stroke-width="3"/><circle cx="45" cy="35" r="17" fill="#f2c6a4" stroke="#3b2a20" stroke-width="2"/><path d="M28 35Q29 13 45 12q19 2 18 25-9-12-17-10-7 6-18 8" fill="${hair}"/><circle cx="39" cy="36" r="2"/><circle cx="51" cy="36" r="2"/><path d="M38 45q7 5 14 0" fill="none" stroke="#8a4b40"/><path d="M27 58l-10 18M63 58l10 18" stroke="#f2c6a4" stroke-width="6" stroke-linecap="round"/><path d="M35 84l-5 12M55 84l5 12" stroke="#2d2925" stroke-width="7"/></svg>`}function enemySvg(i){if(i===4)return `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="91" rx="35" ry="7" fill="#0005"/><path d="M18 73Q18 34 50 20q32 14 32 53L68 91H32z" fill="#72502e" stroke="#2a2118" stroke-width="4"/><circle cx="50" cy="38" r="20" fill="#8c6338"/><path d="M28 38Q50 9 72 38" fill="#3b3022"/><circle cx="42" cy="39" r="3" fill="#ffca3a"/><circle cx="58" cy="39" r="3" fill="#ffca3a"/><path d="M39 51q11 8 22 0" stroke="#2a1610" stroke-width="4"/><path d="M22 55L8 22" stroke="#4a3421" stroke-width="8"/></svg>`;const c=['#d8d2bf','#58616a','#48714f','#39264e'][i%4];return `<svg viewBox="0 0 90 100"><ellipse cx="45" cy="91" rx="27" ry="7" fill="#0005"/><path d="M27 53q18-18 36 0l6 33H21z" fill="${c}" stroke="#1e2420" stroke-width="3"/><circle cx="45" cy="35" r="17" fill="${c}" stroke="#1e2420" stroke-width="3"/><circle cx="39" cy="36" r="3"/><circle cx="51" cy="36" r="3"/><path d="M28 61L14 75M62 61l14 14" stroke="${c}" stroke-width="7"/></svg>`}const H=[{n:'Swordman',i:0,c:2,t:'Warrior'},{n:'Archer',i:1,c:2,t:'Ranger'},{n:'Acolyte',i:3,c:2,t:'Forest'},{n:'Dark Mage',i:2,c:2,t:'Mage'},{n:'Beast Lord',i:4,c:2,t:'Beast'}];let gold=3,lv=1,xp=0,bench=[],field=[],sel=-1,offers=[],battle=false;const req={1:4,2:8,3:12,4:16},board=document.querySelector('#board'),benchEl=document.querySelector('#bench'),shop=document.querySelector('#shop'),toast=document.querySelector('#toast');function msg(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1000)}function getCell(c,r){return board.children[r*8+c]}function renderBoard(){board.innerHTML='';for(let r=0;r<8;r++)for(let c=0;c<8;c++){const d=document.createElement('div');d.className='cell'+(r>=5?' player':'');d.dataset.c=c;d.dataset.r=r;d.onclick=()=>place(c,r);board.appendChild(d)}field.forEach((u,k)=>{const d=document.createElement('div');d.className='unit';d.innerHTML=heroSvg(u.i)+'<div class="uBar"><i></i></div>';d.onclick=e=>{e.stopPropagation();if(bench.length<6){bench.push(field.splice(k,1)[0]);sel=-1;render()}};getCell(u.c,u.r).appendChild(d)})}let drag=null,ghost=null;function target(x,y){const R=board.getBoundingClientRect();if(x<R.left||x>R.right||y<R.top||y>R.bottom)return null;const c=Math.max(0,Math.min(7,Math.floor((x-R.left)/R.width*8))),r=Math.max(0,Math.min(7,Math.floor((y-R.top)/R.height*8)));return r>=5?{c,r}:null}function begin(e,i){if(!bench[i]||battle)return;e.preventDefault();sel=i;drag=i;ghost=document.createElement('div');ghost.className='ghost';ghost.innerHTML=heroSvg(bench[i].i);document.body.appendChild(ghost);move(e);renderBench()}function move(e){if(!ghost)return;ghost.style.left=e.clientX+'px';ghost.style.top=e.clientY+'px';document.querySelectorAll('.over').forEach(x=>x.classList.remove('over'));const t=target(e.clientX,e.clientY);if(t)getCell(t.c,t.r).classList.add('over')}function end(e){if(drag===null)return;const t=target(e.clientX,e.clientY);if(t)place(t.c,t.r);ghost?.remove();ghost=null;drag=null;document.querySelectorAll('.over').forEach(x=>x.classList.remove('over'))}addEventListener('pointermove',e=>{if(drag!==null)move(e)},{passive:false});addEventListener('pointerup',end);addEventListener('pointercancel',e=>{ghost?.remove();ghost=null;drag=null});function renderBench(){benchEl.innerHTML='';for(let i=0;i<6;i++){const s=document.createElement('div');s.className='slot'+(bench[i]?' filled':'')+(sel===i?' selected':'');if(bench[i]){s.innerHTML=heroSvg(bench[i].i)+'<b>'+bench[i].n+'</b>';s.onpointerdown=e=>begin(e,i);s.onclick=()=>{sel=sel===i?-1:i;renderBench()}}benchEl.appendChild(s)}}function place(c,r){if(sel<0||!bench[sel]||battle)return;if(r<5){msg('วางได้เฉพาะ 3 แถวล่าง');return}if(field.length>=lv){msg('กระดาน Lv.'+lv+' ลงได้ '+lv+' ตัว');return}if(field.some(u=>u.c===c&&u.r===r)){msg('ช่องนี้มีตัวแล้ว');return}const u=bench.splice(sel,1)[0];u.c=c;u.r=r;field.push(u);sel=-1;render()}function makeOffers(){offers=Array.from({length:5},()=>H[Math.floor(Math.random()*H.length)])}function renderShop(){shop.innerHTML='';offers.forEach(h=>{const c=document.createElement('div');c.className='card';c.innerHTML='<div class="portrait">'+heroSvg(h.i)+'</div><div class="name">'+h.n+'</div><small>'+h.t+' • Class 1</small><button>🪙'+h.c+'</button>';c.querySelector('button').onclick=()=>{if(gold<h.c||bench.length>=6||battle)return;gold-=h.c;bench.push({...h});render()};shop.appendChild(c)})}function renderTeam(){const t=document.querySelector('#team');t.innerHTML='';[...field,...bench].slice(0,8).forEach((u,i)=>{t.innerHTML+='<div class="member"><div class="avatar">'+['⚔','🏹','🔮','✚','🐺'][u.i%5]+'</div><div class="bars"><div class="hp"><i style="width:'+(100-i*6)+'%"></i></div><div class="mp"><i style="width:'+(45+i*5)+'%"></i></div></div><div class="num">'+(100-i*6)+'</div></div>'})}function render(){renderBoard();renderBench();renderShop();renderTeam();document.querySelector('#gold').textContent=gold;document.querySelector('#lv').textContent=lv;document.querySelector('#xp').textContent=lv<5?xp+'/'+req[lv]:'MAX';document.querySelector('#used').textContent=field.length;document.querySelector('#cap').textContent=lv}document.querySelector('#buyExp').onclick=()=>{if(gold<4||lv>=5||battle)return;gold-=4;xp+=4;while(lv<5&&xp>=req[lv]){xp-=req[lv];lv++;msg('กระดานเลเวล '+lv)}render()};document.querySelector('#refresh').onclick=()=>{if(gold<2||battle)return;gold-=2;makeOffers();render()};document.querySelector('#start').onclick=()=>{if(!field.length||battle)return;battle=true;renderBoard();const enemies=[{i:4,c:3,r:1},{i:2,c:1,r:1},{i:0,c:5,r:1},{i:1,c:6,r:2}];enemies.forEach((e,k)=>{const d=document.createElement('div');d.className='unit enemy';d.innerHTML=enemySvg(e.i)+'<div class="uBar"><i></i></div>';getCell(e.c,e.r).appendChild(d);setTimeout(()=>d.classList.add('hit'),500+k*140);setTimeout(()=>d.classList.add('dead'),1100+k*120)});field.forEach((u,k)=>setTimeout(()=>getCell(u.c,u.r).querySelector('.unit')?.classList.add('attack'),300+k*120));setTimeout(()=>{gold+=5;battle=false;makeOffers();msg('ชนะ +5 ทอง');render()},1900)};makeOffers();render();</script></body></html>
