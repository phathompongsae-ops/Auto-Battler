<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Auto Battler — Phase 1 Vertical Slice</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#080b08;color:#f6e7bd;font-family:system-ui,sans-serif;touch-action:none}button{font:inherit}#app{position:fixed;inset:0;background:radial-gradient(circle at 50% 45%,#65804c 0 20%,#31462e 46%,#111a14 78%,#080b08)}#app:before{content:"";position:absolute;inset:0;background:linear-gradient(130deg,#92b26722,#0000 35%),repeating-linear-gradient(35deg,#fff0 0 18px,#c7e5a006 19px 20px)}#top{position:absolute;top:6px;left:7px;right:7px;display:flex;align-items:center;gap:6px;z-index:20}.pill{padding:6px 10px;border:1px solid #b99149;border-radius:18px;background:#15130fdf;font-size:12px}.grow{flex:1}.tool{width:38px;height:34px;border:1px solid #b99149;border-radius:8px;background:#2a2419;color:#ffe8a8;font-weight:900}#notice{position:absolute;top:48px;left:50%;transform:translateX(-50%);z-index:20;padding:5px 11px;border-radius:14px;background:#11100cdd;border:1px solid #856c38;font-size:11px;white-space:nowrap}#wrap{position:absolute;left:50%;top:45%;width:min(78vw,720px);aspect-ratio:1;transform:translate(-50%,-50%);transform-origin:center;transition:.15s}#board{position:absolute;inset:0;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);transform:rotateX(53deg);transform-origin:center;filter:drop-shadow(0 18px 18px #000b)}.cell{position:relative;border:1px solid #e6d59f38;background:#537c4a9c}.cell:nth-child(even){background:#426b419c}.cell.player{box-shadow:inset 0 0 0 1px #73ea8d77}.cell:hover{background:#9db666aa}.unit{position:absolute;left:5%;bottom:3%;width:90%;height:120%;z-index:4;transform:rotateX(-53deg);transform-origin:bottom center;filter:drop-shadow(0 6px 4px #0009);animation:idle 1.1s ease-in-out infinite alternate}.unit.attack{animation:attack .32s}.unit.hit{animation:hit .18s 2}.unit.dead{animation:dead .5s forwards}.unit.enemy{filter:drop-shadow(0 6px 5px #500c)}.unit svg{width:100%;height:100%;overflow:visible}.hp{position:absolute;left:8%;right:8%;top:-5px;height:5px;background:#381010;border:1px solid #000;transform:rotateX(-53deg);z-index:8}.hp i{display:block;height:100%;background:#54d866;width:100%}.enemy .hp i{background:#e4574e}@keyframes idle{to{transform:rotateX(-53deg) translateY(-4px)}}@keyframes attack{50%{transform:rotateX(-53deg) translateY(-13px) scale(1.12)}}@keyframes hit{50%{filter:brightness(2) drop-shadow(0 0 10px white)}}@keyframes dead{to{opacity:0;transform:rotateX(-53deg) translateY(16px) scale(.35)}}#bench{position:absolute;left:50%;bottom:102px;transform:translateX(-50%);z-index:21;display:grid;grid-template-columns:repeat(9,58px);gap:4px;padding:6px;border:2px solid #9c7941;border-radius:10px;background:#15110dde;box-shadow:0 6px 18px #000}.slot{position:relative;height:62px;border:2px solid #5e4b2e;border-radius:7px;background:#261e14;overflow:hidden}.slot.selected{border-color:#ffe16a;box-shadow:0 0 13px #ffd65b}.slot svg{width:100%;height:100%}.slot b{position:absolute;left:1px;right:1px;bottom:0;background:#000b;text-align:center;font-size:8px}#bottom{position:absolute;left:0;right:0;bottom:0;height:98px;z-index:20;display:flex;background:#0c0a08ef;border-top:1px solid #745b31}#shop{display:flex;gap:5px;overflow-x:auto;padding:7px;flex:1}.card{width:78px;min-width:78px;border:1px solid #b08a49;border-radius:7px;background:#ead8af;color:#281f13;padding:3px;text-align:center}.portrait{height:48px}.portrait svg{width:100%;height:100%}.card small{display:block;font-size:9px}.weapon{height:22px}.card button{width:100%;border:0;border-radius:5px;background:#654921;color:#fff0c0;padding:3px;font-size:10px}#actions{width:150px;padding:7px;display:grid;grid-template-columns:1fr 1fr;gap:5px}#actions button{border:1px solid #a68343;border-radius:7px;background:#382a1a;color:#ffe9b0;font-weight:800;font-size:11px}#start{grid-column:1/3;background:#b8882e!important;color:#20180d!important}#toast{position:absolute;left:50%;top:30%;transform:translate(-50%,-50%) scale(.8);opacity:0;z-index:40;padding:14px 22px;border:2px solid #e4c265;border-radius:13px;background:#17130fee;font-weight:900;transition:.2s}.show{opacity:1!important;transform:translate(-50%,-50%) scale(1)!important}#fx{display:none;position:absolute;width:110px;height:80px;z-index:12;pointer-events:none}@media(max-width:760px){#wrap{width:min(91vw,570px);top:43%}#bench{grid-template-columns:repeat(9,43px);bottom:97px}.slot{height:49px}#bottom{height:93px}.card{width:66px;min-width:66px}.portrait{height:40px}#actions{width:126px}}</style></head><body><div id="app"><div id="top"><div class="pill">💰 <b id="gold">8</b></div><div class="pill">กระดาน Lv.<b id="level">1</b> • <b id="used">0</b>/<b id="cap">1</b></div><div class="pill">EXP <b id="exp">0</b>/<b id="need">4</b></div><div class="grow"></div><button class="tool" id="out">−</button><button class="tool" id="in">＋</button><button class="tool" id="reset">⌂</button></div><div id="notice">Phase 1 • ฮีโร่ 4 • มอนสเตอร์ 4 • บอส 1 • อาวุธ/VFX/ฉากจริงแบบเวกเตอร์</div><div id="toast"></div><div id="wrap"><div id="board"></div><div id="fx"></div></div><div id="bench"></div><div id="bottom"><div id="shop"></div><div id="actions"><button id="buyExp">ซื้อ EXP<br>4💰</button><button id="reroll">รีโรล<br>2💰</button><button id="start">เริ่มต่อสู้</button></div></div></div><script>
const C={blue:'#4d81c7',red:'#b64f32',green:'#4e8853',purple:'#7350a2',gold:'#d8b461',dark:'#20231f',white:'#eee7d8'};
function heroSvg(i){const p=[C.blue,C.red,C.green,C.purple][i],hair=['#182845','#7a2d18','#6d4a27','#4c2c74'][i],weapon=i===0?'<path d="M67 20l5 3-30 54-6-4z" fill="#dce8ef" stroke="#6b5324" stroke-width="2"/>':i===1?'<path d="M72 18c-17 5-22 32-18 58" fill="none" stroke="#d6b45e" stroke-width="4"/><path d="M70 19L48 77" stroke="#eee"/>':i===2?'<path d="M67 18l5 2-11 55-5-1z" fill="#50391e"/><circle cx="69" cy="19" r="9" fill="#6ce281" stroke="#28452b" stroke-width="3"/>':'<path d="M66 15l5 2-13 57-5-1z" fill="#3c2c23"/><circle cx="69" cy="16" r="9" fill="#a777ff" stroke="#e0bd5b" stroke-width="3"/>';return `<svg viewBox="0 0 90 100"><ellipse cx="45" cy="91" rx="28" ry="7" fill="#0005"/>${weapon}<path d="M31 50Q45 38 59 50l8 35H23z" fill="${p}" stroke="#d5b55b" stroke-width="3"/><circle cx="45" cy="35" r="17" fill="#f2c6a4" stroke="#3b2a20" stroke-width="2"/><path d="M28 35Q29 13 45 12q19 2 18 25-9-12-17-10-7 6-18 8" fill="${hair}"/><circle cx="39" cy="36" r="2"/><circle cx="51" cy="36" r="2"/><path d="M38 45q7 5 14 0" fill="none" stroke="#8a4b40"/><path d="M27 58l-10 18M63 58l10 18" stroke="#f2c6a4" stroke-width="6" stroke-linecap="round"/><path d="M35 84l-5 12M55 84l5 12" stroke="#2d2925" stroke-width="7"/></svg>`}
function enemySvg(i){if(i===4)return `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="91" rx="35" ry="7" fill="#0005"/><path d="M18 73Q18 34 50 20q32 14 32 53L68 91H32z" fill="#6e4c2d" stroke="#2a2118" stroke-width="4"/><circle cx="50" cy="38" r="20" fill="#8c6338"/><path d="M28 38Q50 9 72 38" fill="#3b3022"/><circle cx="42" cy="39" r="3" fill="#ffca3a"/><circle cx="58" cy="39" r="3" fill="#ffca3a"/><path d="M39 51q11 8 22 0" stroke="#2a1610" stroke-width="4"/><path d="M22 55L8 22" stroke="#4a3421" stroke-width="8"/><path d="M5 21h15" stroke="#b8a27d" stroke-width="7"/></svg>`;const col=['#d8d2bf','#58616a','#436d55','#34234f'][i],eye=i===0?'#222':'#8cff80';return `<svg viewBox="0 0 90 100"><ellipse cx="45" cy="91" rx="27" ry="7" fill="#0005"/><path d="M27 53q18-18 36 0l6 33H21z" fill="${col}" stroke="#1e2420" stroke-width="3"/><circle cx="45" cy="35" r="17" fill="${col}" stroke="#1e2420" stroke-width="3"/>${i===0?'<path d="M35 30h20M38 42h14" stroke="#333" stroke-width="4"/><circle cx="39" cy="35" r="3"/><circle cx="51" cy="35" r="3"/>':'<path d="M29 34q16-18 32 0v18H29z" fill="#1b2420"/><circle cx="39" cy="38" r="3" fill="'+eye+'"/><circle cx="51" cy="38" r="3" fill="'+eye+'"/>'}<path d="M28 61L14 75M62 61l14 14" stroke="${col}" stroke-width="7"/><path d="M35 84l-4 12M55 84l4 12" stroke="#282a28" stroke-width="7"/></svg>`}
function weaponSvg(i){const c=['#d9e3e8','#e7d48b','#68c77a','#a67cff'][i];return `<svg viewBox="0 0 100 32"><path d="M12 26L72 5l8 5-61 21z" fill="${c}" stroke="#5a431e" stroke-width="3"/><circle cx="15" cy="26" r="6" fill="#c89a43"/></svg>`}
const H=[{n:'Swordman',i:0,hp:135,atk:25},{n:'Archer',i:1,hp:108,atk:22},{n:'Acolyte',i:2,hp:122,atk:18},{n:'Mage',i:3,hp:98,atk:30}],E=[{n:'Skeleton',i:0,hp:72},{n:'Stone Wolf',i:1,hp:92},{n:'Spirit Archer',i:2,hp:68},{n:'Shadow Assassin',i:3,hp:82},{n:'Champion Big',i:4,hp:240}];let gold=8,level=1,exp=0,bench=[H[0],H[1],H[2]],field=[],selected=-1,battle=false,wave=1,zoom=1,px=0,py=0;const req={1:4,2:8,3:12,4:16},board=document.querySelector('#board'),benchEl=document.querySelector('#bench'),shop=document.querySelector('#shop'),wrap=document.querySelector('#wrap'),toast=document.querySelector('#toast');
function cell(c,r){return board.children[r*8+c]}function renderBoard(){board.innerHTML='';for(let r=0;r<8;r++)for(let c=0;c<8;c++){let d=document.createElement('div');d.className='cell'+(r>=5?' player':'');d.onclick=()=>place(c,r);board.appendChild(d)}field.forEach((u,k)=>{let d=document.createElement('div');d.className='unit';d.innerHTML=heroSvg(u.i)+'<div class="hp"><i></i></div>';d.onclick=e=>{e.stopPropagation();selected='f'+k};cell(u.c,u.r).appendChild(d)})}
function renderBench(){benchEl.innerHTML='';for(let i=0;i<9;i++){let s=document.createElement('div');s.className='slot'+(selected===i?' selected':'');if(bench[i]){s.innerHTML=heroSvg(bench[i].i)+'<b>'+bench[i].n+'</b>';s.onclick=()=>{selected=selected===i?-1:i;renderBench()}}benchEl.appendChild(s)}}
function renderShop(){shop.innerHTML='';for(let i=0;i<4;i++){let h=H[Math.floor(Math.random()*H.length)],c=document.createElement('div');c.className='card';c.innerHTML='<div class="portrait">'+heroSvg(h.i)+'</div><small>'+h.n+'</small><div class="weapon">'+weaponSvg(h.i)+'</div><button>ซื้อ 2💰</button>';c.querySelector('button').onclick=()=>{if(gold<2||bench.length>=9)return;gold-=2;bench.push(h);render()};shop.appendChild(c)}}
function render(){renderBoard();renderBench();goldEl.textContent=gold;levelEl.textContent=level;usedEl.textContent=field.length;capEl.textContent=level;expEl.textContent=exp;needEl.textContent=level<5?req[level]:'MAX';buyExp.disabled=gold<4||level>=5||battle;start.disabled=!field.length||battle}const goldEl=document.querySelector('#gold'),levelEl=document.querySelector('#level'),usedEl=document.querySelector('#used'),capEl=document.querySelector('#cap'),expEl=document.querySelector('#exp'),needEl=document.querySelector('#need'),buyExp=document.querySelector('#buyExp'),start=document.querySelector('#start');
function place(c,r){if(battle||r<5||typeof selected!=='number'||selected<0)return;if(field.length>=level)return say('ต้องอัปเลเวลกระดานก่อน');if(field.some(x=>x.c===c&&x.r===r))return;let h=bench.splice(selected,1)[0];field.push({...h,c,r});selected=-1;render()}function say(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1100)}
buyExp.onclick=()=>{if(gold<4||level>=5)return;gold-=4;exp+=4;while(level<5&&exp>=req[level]){exp-=req[level];level++;say('กระดานเลเวล '+level)}render()};reroll.onclick=()=>{if(gold<2||battle)return;gold-=2;renderShop();render()};
start.onclick=async()=>{battle=true;render();let foes=wave%5===0?[E[4]]:E.slice(0,Math.min(4,1+Math.floor(wave/2))),nodes=[];foes.forEach((e,i)=>{let d=document.createElement('div');d.className='unit enemy';d.innerHTML=enemySvg(e.i)+'<div class="hp"><i></i></div>';cell(1+i*2,1).appendChild(d);nodes.push({e,d,hp:e.hp})});for(let turn=0;turn<9&&nodes.some(x=>x.hp>0);turn++){for(let h of field){let t=nodes.find(x=>x.hp>0);if(!t)break;let a=cell(h.c,h.r).querySelector('.unit');a.classList.add('attack');showFx(t.d,h.i);await wait(230);t.hp-=h.atk;t.d.classList.add('hit');t.d.querySelector('i').style.width=Math.max(0,t.hp/t.e.hp*100)+'%';if(t.hp<=0)t.d.classList.add('dead');await wait(170);a.classList.remove('attack');t.d.classList.remove('hit')}}let win=!nodes.some(x=>x.hp>0);gold+=win?6:3;wave++;say(win?'ชนะ +6 ทอง':'แพ้ +3 ทอง');battle=false;renderShop();render()};function wait(ms){return new Promise(r=>setTimeout(r,ms))}function showFx(target,type){let f=document.querySelector('#fx'),r=target.getBoundingClientRect(),w=wrap.getBoundingClientRect();f.style.display='block';f.style.left=r.left-w.left+r.width/2-55+'px';f.style.top=r.top-w.top+r.height/2-40+'px';f.innerHTML=type===3?'<svg viewBox="0 0 120 80"><circle cx="60" cy="40" r="25" fill="none" stroke="#a77cff" stroke-width="6"/><path d="M20 40h80M60 8v64" stroke="#d8bfff" stroke-width="5"/></svg>':'<svg viewBox="0 0 120 80"><path d="M12 60Q55 4 108 24Q62 29 25 69" fill="none" stroke="#ffd36b" stroke-width="10"/><circle cx="76" cy="34" r="9" fill="#fff3a8"/></svg>';setTimeout(()=>f.style.display='none',220)}
function cam(){wrap.style.transform=`translate(calc(-50% + ${px}px),calc(-50% + ${py}px)) scale(${zoom})`}document.querySelector('#in').onclick=()=>{zoom=Math.min(1.35,zoom+.08);cam()};document.querySelector('#out').onclick=()=>{zoom=Math.max(.8,zoom-.08);cam()};document.querySelector('#reset').onclick=()=>{zoom=1;px=py=0;cam()};let drag=null;wrap.onpointerdown=e=>{if(e.target!==wrap&&e.target!==board)return;drag={x:e.clientX,y:e.clientY,px,py}};addEventListener('pointermove',e=>{if(!drag)return;px=drag.px+e.clientX-drag.x;py=drag.py+e.clientY-drag.y;cam()});addEventListener('pointerup',()=>drag=null);renderShop();render();
</script></body></html>
