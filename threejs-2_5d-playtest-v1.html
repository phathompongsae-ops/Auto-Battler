<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Auto Battler Three.js 2.5D V1</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#08110d;color:#f5e6bd;font-family:system-ui,sans-serif;touch-action:none}button{font:inherit}#game{position:fixed;inset:0;display:block;z-index:1}#ui{position:fixed;inset:0;z-index:10;pointer-events:none}.top{position:absolute;left:8px;right:8px;top:6px;height:40px;display:flex;align-items:center;gap:6px}.pill{pointer-events:none;padding:6px 10px;border:1px solid #9c7b43;border-radius:16px;background:#15130fdd;font-size:11px;font-weight:800;box-shadow:0 2px 8px #0008}.grow{flex:1}.iconBtn{pointer-events:auto;width:34px;height:32px;border:1px solid #9c7b43;border-radius:8px;background:#18150fdd;color:#ffe3a0;font-weight:900}.side{position:absolute;top:52px;bottom:162px;width:102px;padding:7px;border:1px solid #7d6337;border-radius:10px;background:#11100dcc;box-shadow:0 4px 14px #0008;overflow:hidden}.left{left:7px}.right{right:7px}.side h3{margin:0 0 6px;font-size:10px;text-align:center;color:#ffe1a0}.syn{padding:5px 2px;border-bottom:1px solid #4a3a24;font-size:9px}.member{display:flex;align-items:center;gap:4px;padding:4px 0;border-bottom:1px solid #4a3a24}.avatar{width:22px;height:22px;border-radius:5px;background:linear-gradient(#597554,#253927)}.mbar{height:4px;flex:1;background:#31291e;border-radius:3px;overflow:hidden}.mbar i{display:block;height:100%;background:#5ed06c}.bench{position:absolute;left:50%;bottom:102px;transform:translateX(-50%);display:grid;grid-template-columns:repeat(6,48px);gap:4px;padding:5px;border:1px solid #8d6e3b;border-radius:9px;background:#15120edb;box-shadow:0 5px 16px #000a;pointer-events:auto}.slot{position:relative;width:48px;height:52px;border:2px solid #59472c;border-radius:8px;background:#241d14;overflow:hidden}.slot.filled{border-color:#bd934d}.slot.selected{border-color:#ffe16d;box-shadow:0 0 11px #ffd660}.slot canvas{width:100%;height:100%}.slot b{position:absolute;left:1px;right:1px;bottom:0;background:#000b;text-align:center;font-size:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.shopbar{position:absolute;left:0;right:0;bottom:0;height:94px;background:#0d0b08ef;border-top:1px solid #70562f;display:grid;grid-template-columns:112px 1fr 112px;gap:6px;padding:6px}.roundBtn{pointer-events:auto;border:2px solid #9c7639;border-radius:50%;background:radial-gradient(circle,#523a19,#20160d);color:#ffe7a3;font-weight:900;font-size:11px}.shop{display:grid;grid-template-columns:repeat(5,minmax(64px,1fr));gap:5px;min-width:0}.card{pointer-events:auto;border:1px solid #84683a;border-radius:8px;background:#181a1d;color:#f0ddb0;padding:3px;text-align:center;overflow:hidden}.portrait{height:42px;border-radius:6px;overflow:hidden;background:#28372b}.portrait canvas{width:100%;height:100%}.card b{display:block;font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.card small{display:block;font-size:8px;color:#c8b78f}.card button{margin-top:2px;width:100%;border:0;border-radius:5px;background:#bd8b2d;color:#20170b;font-size:9px;font-weight:900;padding:3px}.card button:disabled{opacity:.4}.start{position:absolute;right:12px;bottom:100px;pointer-events:auto;border:1px solid #a77e37;border-radius:8px;background:#bf8c2d;color:#1f160b;font-weight:900;padding:7px 11px;font-size:11px}.toast{position:absolute;left:50%;top:18%;transform:translate(-50%,-50%) scale(.9);opacity:0;padding:10px 16px;border:1px solid #caa54f;border-radius:10px;background:#17130fed;font-weight:900;font-size:12px;transition:.18s}.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}.ghost{position:fixed;width:58px;height:68px;pointer-events:none;z-index:50;transform:translate(-50%,-70%);filter:drop-shadow(0 7px 5px #000b)}.ghost canvas{width:100%;height:100%}@media(max-width:800px){.side{width:88px}.bench{grid-template-columns:repeat(6,42px)}.slot{width:42px;height:46px}.shopbar{grid-template-columns:96px 1fr 96px;height:88px}.bench{bottom:95px}.portrait{height:37px}.card b{font-size:8px}.card small{font-size:7px}.top{gap:4px}.pill{padding:5px 7px;font-size:9px}}
</style></head><body><canvas id="game"></canvas><div id="ui"><div class="top"><div class="pill">Lv.<b id="lv">1</b> • EXP <b id="xp">0/4</b></div><div class="pill">💰 <b id="gold">3</b></div><div class="pill">👥 <b id="used">0</b>/<b id="cap">1</b></div><div class="grow"></div><button class="iconBtn" id="speed">×1</button><button class="iconBtn" id="reset">⌂</button></div><aside class="side left"><h3>SYNERGY</h3><div id="syn"></div></aside><aside class="side right"><h3>TEAM</h3><div id="team"></div></aside><div class="bench" id="bench"></div><button class="start" id="start">เริ่มต่อสู้</button><div class="shopbar"><button class="roundBtn" id="buyXp">BUY EXP<br>4💰</button><div class="shop" id="shop"></div><button class="roundBtn" id="refresh">REFRESH<br>2💰</button></div><div class="toast" id="toast"></div></div><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script>
const canvas=document.getElementById('game'),renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;const scene=new THREE.Scene();scene.background=new THREE.Color(0x0d1b13);scene.fog=new THREE.Fog(0x0d1b13,16,34);const camera=new THREE.PerspectiveCamera(42,1,.1,100);camera.position.set(8.8,11.5,12.8);camera.lookAt(0,0,0.6);const hemi=new THREE.HemisphereLight(0xd9f2d1,0x24351f,1.35);scene.add(hemi);const sun=new THREE.DirectionalLight(0xffefc4,1.6);sun.position.set(-7,12,6);sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);scene.add(sun);
const world=new THREE.Group();scene.add(world);const ground=new THREE.Mesh(new THREE.CircleGeometry(13,48),new THREE.MeshStandardMaterial({color:0x315837,roughness:1}));ground.rotation.x=-Math.PI/2;ground.position.y=-.16;ground.receiveShadow=true;world.add(ground);for(let i=0;i<22;i++){const a=i/22*Math.PI*2,r=9.5+Math.random()*2;const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.18,.28,1.5,8),new THREE.MeshStandardMaterial({color:0x5d3b22}));trunk.position.set(Math.cos(a)*r,.75,Math.sin(a)*r);trunk.castShadow=true;const crown=new THREE.Mesh(new THREE.SphereGeometry(.8+Math.random()*.4,10,8),new THREE.MeshStandardMaterial({color:i%3?0x2d6a39:0x437d46}));crown.position.copy(trunk.position);crown.position.y=1.8;world.add(trunk,crown)}for(let i=0;i<14;i++){const rock=new THREE.Mesh(new THREE.DodecahedronGeometry(.25+Math.random()*.35,0),new THREE.MeshStandardMaterial({color:0x69736b,roughness:1}));rock.scale.y=.65;rock.position.set((Math.random()-.5)*20,.08,(Math.random()-.5)*18);rock.castShadow=true;world.add(rock)}
const GRID=8,TILE=1.08,tiles=[],board=new THREE.Group();board.position.z=.3;world.add(board);for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){const geo=new THREE.BoxGeometry(TILE*.98,.12,TILE*.98),mat=new THREE.MeshStandardMaterial({color:(r+c)%2?0x5e7058:0x728066,roughness:.95});const t=new THREE.Mesh(geo,mat);t.position.set((c-3.5)*TILE,0,(r-3.5)*TILE);t.receiveShadow=true;t.userData={c,r,base:mat.color.clone()};tiles.push(t);board.add(t)}const rim=new THREE.Mesh(new THREE.BoxGeometry(9.2,.25,9.2),new THREE.MeshStandardMaterial({color:0x777862,roughness:.9}));rim.position.y=-.12;board.add(rim);board.children.forEach(x=>x!==rim&&(x.position.y=.06));
const TYPES=[{n:'Swordman',role:'Warrior',c:'#4b77c6',accent:'#d9b45d',hp:135,atk:25},{n:'Archer',role:'Ranger',c:'#4e8a50',accent:'#d7b466',hp:108,atk:22},{n:'Acolyte',role:'Forest',c:'#d6b36b',accent:'#76c778',hp:122,atk:18},{n:'Mage',role:'Mage',c:'#7650aa',accent:'#d8b65d',hp:98,atk:30}];
function portraitCanvas(type,enemy=false){const c=document.createElement('canvas');c.width=160;c.height=180;const x=c.getContext('2d');x.clearRect(0,0,160,180);x.fillStyle='rgba(0,0,0,.28)';x.beginPath();x.ellipse(80,164,46,12,0,0,7);x.fill();const col=enemy?'#784735':type.c,accent=enemy?'#c8a55f':type.accent;x.fillStyle=col;x.strokeStyle=accent;x.lineWidth=8;x.beginPath();x.roundRect(42,78,76,70,28);x.fill();x.stroke();x.fillStyle=enemy?'#8f6943':'#f0c6a4';x.strokeStyle='#34251c';x.lineWidth=5;x.beginPath();x.arc(80,58,31,0,7);x.fill();x.stroke();x.fillStyle=enemy?'#382418':['#1d2b49','#6e2e18','#76532d','#4d2e71'][TYPES.indexOf(type)];x.beginPath();x.arc(80,50,33,Math.PI,0);x.lineTo(113,65);x.quadraticCurveTo(93,40,80,47);x.quadraticCurveTo(66,40,47,66);x.fill();x.fillStyle='#211';x.beginPath();x.arc(69,60,3,0,7);x.arc(91,60,3,0,7);x.fill();x.strokeStyle='#8a4b40';x.lineWidth=3;x.beginPath();x.arc(80,68,10,.2,2.9);x.stroke();x.strokeStyle=accent;x.lineWidth=8;x.lineCap='round';if(enemy){x.beginPath();x.moveTo(38,95);x.lineTo(18,125);x.moveTo(122,95);x.lineTo(143,125);x.stroke()}else{const i=TYPES.indexOf(type);if(i===0){x.strokeStyle='#dfe8ed';x.beginPath();x.moveTo(118,40);x.lineTo(82,128);x.stroke()}if(i===1){x.strokeStyle='#d4b25e';x.beginPath();x.arc(112,87,38,-1.2,1.2);x.stroke()}if(i===2){x.strokeStyle='#5e3d20';x.beginPath();x.moveTo(122,38);x.lineTo(108,132);x.stroke();x.fillStyle='#68d979';x.beginPath();x.arc(123,35,14,0,7);x.fill()}if(i===3){x.strokeStyle='#513527';x.beginPath();x.moveTo(122,35);x.lineTo(108,132);x.stroke();x.fillStyle='#aa79ff';x.beginPath();x.arc(123,32,14,0,7);x.fill()}}return c}
function spriteTexture(type,enemy=false){const c=portraitCanvas(type,enemy),tex=new THREE.CanvasTexture(c);tex.colorSpace=THREE.SRGBColorSpace;return tex}function makeUnit(type,team,c,r){const g=new THREE.Group(),shadow=new THREE.Mesh(new THREE.CircleGeometry(.32,20),new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.35,depthWrite:false}));shadow.rotation.x=-Math.PI/2;shadow.position.y=.03;g.add(shadow);const mat=new THREE.SpriteMaterial({map:spriteTexture(type,team==='enemy'),transparent:true,depthTest:true});const s=new THREE.Sprite(mat);s.scale.set(1.05,1.22,1);s.position.y=.72;g.add(s);const hpBg=new THREE.Sprite(new THREE.SpriteMaterial({color:0x351010}));hpBg.scale.set(.72,.055,1);hpBg.position.set(0,1.35,0);g.add(hpBg);const hp=new THREE.Sprite(new THREE.SpriteMaterial({color:team==='enemy'?0xe34f48:0x54d66b}));hp.scale.set(.68,.035,1);hp.position.set(0,1.35,.01);g.add(hp);g.position.set((c-3.5)*TILE,.13,(r-3.5)*TILE+.3);g.userData={type,team,c,r,hp:type.hp,maxHp:type.hp,hpSprite:hp,state:'idle',t:Math.random()*6};world.add(g);return g}
let gold=3,level=1,xp=0,bench=[],field=[],enemies=[],selected=-1,battle=false,offers=[],speed=1;const req={1:4,2:8,3:12,4:16},ray=new THREE.Raycaster(),mouse=new THREE.Vector2(),plane=new THREE.Plane(new THREE.Vector3(0,1,0),-.12),hit=new THREE.Vector3();const ui={gold:document.getElementById('gold'),lv:document.getElementById('lv'),xp:document.getElementById('xp'),used:document.getElementById('used'),cap:document.getElementById('cap'),bench:document.getElementById('bench'),shop:document.getElementById('shop'),syn:document.getElementById('syn'),team:document.getElementById('team'),toast:document.getElementById('toast')};
function toast(t){ui.toast.textContent=t;ui.toast.classList.add('show');setTimeout(()=>ui.toast.classList.remove('show'),1000)}function makeOffers(){offers=Array.from({length:5},()=>TYPES[Math.floor(Math.random()*TYPES.length)])}function renderUI(){ui.gold.textContent=gold;ui.lv.textContent=level;ui.xp.textContent=level<5?xp+'/'+req[level]:'MAX';ui.used.textContent=field.length;ui.cap.textContent=level;ui.bench.innerHTML='';for(let i=0;i<6;i++){const d=document.createElement('div');d.className='slot'+(bench[i]?' filled':'')+(selected===i?' selected':'');if(bench[i]){const cv=portraitCanvas(bench[i]);d.appendChild(cv);const b=document.createElement('b');b.textContent=bench[i].n;d.appendChild(b);d.onpointerdown=e=>dragStart(e,i);d.onclick=()=>{selected=selected===i?-1:i;renderUI()}}ui.bench.appendChild(d)}ui.shop.innerHTML='';offers.forEach(type=>{const d=document.createElement('div');d.className='card';const p=document.createElement('div');p.className='portrait';p.appendChild(portraitCanvas(type));const b=document.createElement('b');b.textContent=type.n;const s=document.createElement('small');s.textContent=type.role+' • 2💰';const bt=document.createElement('button');bt.textContent='ซื้อ';bt.disabled=gold<2||bench.length>=6||battle;bt.onclick=()=>{if(bt.disabled)return;gold-=2;bench.push(type);renderUI()};d.append(p,b,s,bt);ui.shop.appendChild(d)}const counts={};[...field.map(x=>x.userData.type),...bench].forEach(t=>counts[t.role]=(counts[t.role]||0)+1);ui.syn.innerHTML=['Warrior','Ranger','Mage','Forest'].map(r=>'<div class="syn">'+r+' '+(counts[r]||0)+'/2</div>').join('');ui.team.innerHTML='';[...field.map(x=>x.userData.type),...bench].slice(0,8).forEach((t,i)=>{ui.team.innerHTML+='<div class="member"><div class="avatar"></div><div style="font-size:8px">'+t.n+'</div><div class="mbar"><i style="width:'+(100-i*7)+'%"></i></div></div>'})}
function screenToBoard(x,y){const rect=canvas.getBoundingClientRect();mouse.x=((x-rect.left)/rect.width)*2-1;mouse.y=-((y-rect.top)/rect.height)*2+1;ray.setFromCamera(mouse,camera);if(!ray.ray.intersectPlane(plane,hit))return null;const c=Math.floor(hit.x/TILE+4),r=Math.floor((hit.z-.3)/TILE+4);return c>=0&&c<8&&r>=0&&r<8?{c,r}:null}function place(c,r){if(selected<0||!bench[selected]||battle)return;if(r<5){toast('วางได้เฉพาะ 3 แถวล่าง');return}if(field.length>=level){toast('กระดาน Lv.'+level+' ลงได้ '+level+' ตัว');return}if(field.some(u=>u.userData.c===c&&u.userData.r===r)){toast('ช่องนี้มีตัวแล้ว');return}const type=bench.splice(selected,1)[0];field.push(makeUnit(type,'player',c,r));selected=-1;renderUI()}
let drag=null,ghost=null;function dragStart(e,i){if(!bench[i]||battle)return;e.preventDefault();selected=i;ghost=document.createElement('div');ghost.className='ghost';ghost.appendChild(portraitCanvas(bench[i]));document.body.appendChild(ghost);drag=i;dragMove(e);renderUI()}function dragMove(e){if(!ghost)return;ghost.style.left=e.clientX+'px';ghost.style.top=e.clientY+'px';tiles.forEach(t=>t.material.color.copy(t.userData.base));const p=screenToBoard(e.clientX,e.clientY);if(p&&p.r>=5)tiles[p.r*8+p.c].material.color.set(0xa7c85d)}function dragEnd(e){if(drag===null)return;const p=screenToBoard(e.clientX,e.clientY);if(p)place(p.c,p.r);ghost?.remove();ghost=null;drag=null;tiles.forEach(t=>t.material.color.copy(t.userData.base))}addEventListener('pointermove',dragMove,{passive:false});addEventListener('pointerup',dragEnd);addEventListener('pointercancel',dragEnd);canvas.addEventListener('pointerup',e=>{if(!drag){const p=screenToBoard(e.clientX,e.clientY);if(p)place(p.c,p.r)}});
function clearEnemies(){enemies.forEach(e=>world.remove(e));enemies=[]}function startBattle(){if(!field.length||battle)return;battle=true;clearEnemies();const n=Math.min(5,level+1);for(let i=0;i<n;i++)enemies.push(makeUnit(TYPES[i%TYPES.length],'enemy',1+i%5,1+Math.floor(i/5)));renderUI();setTimeout(()=>{battle=false;clearEnemies();gold+=5;makeOffers();toast('ชนะ +5 ทอง');renderUI()},2600/speed)}
document.getElementById('buyXp').onclick=()=>{if(gold<4||level>=5||battle)return;gold-=4;xp+=4;while(level<5&&xp>=req[level]){xp-=req[level];level++;toast('กระดานเลเวล '+level)}renderUI()};document.getElementById('refresh').onclick=()=>{if(gold<2||battle)return;gold-=2;makeOffers();renderUI()};document.getElementById('start').onclick=startBattle;document.getElementById('speed').onclick=e=>{speed=speed===1?2:1;e.currentTarget.textContent='×'+speed};document.getElementById('reset').onclick=()=>{camera.position.set(8.8,11.5,12.8);camera.lookAt(0,0,.6)};
function resize(){renderer.setSize(innerWidth,innerHeight,false);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix()}addEventListener('resize',resize);resize();makeOffers();renderUI();let last=performance.now();function animate(now){requestAnimationFrame(animate);const dt=Math.min(.05,(now-last)/1000)*speed;last=now;[...field,...enemies].forEach((u,i)=>{u.userData.t+=dt;u.children[1].position.y=.72+Math.sin(u.userData.t*3+i)*.025;if(battle){u.rotation.y=Math.sin(u.userData.t*5+i)*.05}});renderer.render(scene,camera)}requestAnimationFrame(animate);toast('เริ่มด้วย 3 เหรียญ • ซื้อฮีโร่ตัวแรก');
</script></body></html>
