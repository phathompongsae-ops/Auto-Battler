<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Battler — โหมด Auto Chess</title>
<style>
  /* ----- Dark minimalist palette ----- */
  :root {
    --bg: #0c0d10; --panel-bg: #1a1c22; --panel-border: #2c2f38; --panel-border-soft: #23262e;
    --text: #e6e8ee; --text-dim: #8b8f9c; --accent: #d8ad4d; --accent-dim: #a8843c;
    --accent-green: #4caf6e; --accent-red: #d9534f; --card-bg: #20232b; --card-border: #343947;
  }
  html, body { margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'Trebuchet MS', sans-serif; }
  canvas { display: block; width: 100%; height: 100%; }
  * { box-sizing: border-box; }

  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-family: monospace; font-size: 18px; background: var(--bg); z-index: 30;
  }

  /* ----- 3D Canvas: full-viewport background layer, everything else floats above it ----- */
  #boardContainer { position: fixed; inset: 0; z-index: 0; }

  /* ----- แถบบนสุด: ซ้าย (เมนู) / กลาง (Gold, Wave, HP — center) / ขวา (speed/pause) ----- */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; display: flex; align-items: flex-start;
    justify-content: space-between; gap: 8px; padding: 10px 14px;
    background: linear-gradient(rgba(6,7,9,0.7), rgba(6,7,9,0));
    color: var(--text); font-size: 15px; z-index: 10; pointer-events: none;
  }
  #topbarLeft, #topbarRight { display: flex; gap: 8px; flex-shrink: 0; pointer-events: auto; }
  #topbarCenter { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; pointer-events: auto; flex: 1; }
  .pill {
    background: rgba(26,28,34,0.82); border: 1px solid var(--panel-border); border-radius: 20px;
    padding: 6px 14px; pointer-events: auto; display: flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  #topbar button, .hudCorner button, #shopToggleBtn, #bagToggleBtn {
    pointer-events: auto; background: #262a33; color: var(--text); border: 1px solid var(--panel-border);
    border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 14px;
  }
  #topbar button:disabled { opacity: 0.4; cursor: not-allowed; }
  #topbar button.active { background: var(--accent-dim); color: #1a1408; }
  a#back { text-decoration: none; }

  /* ----- แผงลอย (Synergy ซ้าย / ทีมในสนาม ขวา / กระเป๋าไอเทม) — ชิดขอบจอซ้าย-ขวาที่สุด
     เพื่อเปิดทางให้กระดาน 3D ตรงกลางขยายเต็มที่ ไม่กินพื้นที่เลย์เอาต์ (ลอยทับฉาก 3D) ----- */
  .floatPanel {
    position: fixed; z-index: 8; width: clamp(130px, 15vw, 165px); max-height: min(48vh, 380px);
    margin: 0; border-radius: 10px; padding: 8px;
    background: rgba(20,22,27,0.68); border: 1px solid var(--panel-border);
    color: var(--text); overflow-y: auto; pointer-events: auto;
  }
  .floatPanel h3 { margin: 0 0 8px; font-size: 12px; color: var(--text-dim); font-weight: normal;
    text-transform: uppercase; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center; }
  #synergyPanel { left: 4px; top: 60px; }
  #hpPanel { right: 4px; top: 60px; }

  /* ----- Synergy panel (ซ้าย): auto class-count status ----- */
  #synergyList { display: flex; flex-direction: column; gap: 6px; }
  .synergyItem {
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
    background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px;
    padding: 7px 10px; font-size: 12px; cursor: help;
  }
  .synergyItem.active { border-color: var(--accent-green); background: rgba(76,175,110,0.14); }
  .synergyName { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .synergyCount { flex-shrink: 0; font-weight: bold; color: var(--text-dim); }
  .synergyItem.active .synergyCount { color: var(--accent-green); }

  /* ----- Team HP panel (ขวา): แทนที่ fieldCards เดิม ----- */
  #teamHpList { display: flex; flex-direction: column; gap: 8px; }
  .teamHpRow {
    position: relative; display: flex; align-items: center; gap: 8px;
    background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 6px;
  }
  .teamHpRow.dead { opacity: 0.4; }
  .teamHpRow img { width: 34px; height: 34px; border-radius: 6px; object-fit: cover; background: #333; flex-shrink: 0; }
  .teamHpInfo { flex: 1; min-width: 0; }
  .teamHpName { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
  .teamHpBarTrack { height: 6px; border-radius: 3px; background: #33261a; overflow: hidden; }
  .teamHpBarFill { height: 100%; background: linear-gradient(90deg, var(--accent-green), #7fd99a); transition: width 0.15s linear; }

  /* ----- แถบ hint / ฮีโร่ที่เลือกไว้ (ม้านั่งสำรองรวมเข้ากับกระดาน 3D แล้ว ไม่มีแผงลอยแยกอีกต่อไป) ----- */
  #hintBar, #selectedUnitBar {
    position: fixed; left: 50%; bottom: 8px; transform: translateX(-50%); z-index: 9;
    max-width: 92vw; align-items: center; gap: 10px; white-space: nowrap;
  }
  #hintBar { font-size: 12px; color: var(--text-dim); }
  #selectedUnitBar { font-size: 13px; }
  #selectedUnitBar button { flex-shrink: 0; }
  #selectedUnitCancelBtn { background: #262a33 !important; color: var(--text) !important; border-color: var(--panel-border) !important; }
  /* ----- ร้านค้า: แผงเลื่อนขึ้นจากขอบล่าง ทับม้านั่ง เมื่อกดปุ่ม Toggle Shop เท่านั้น ----- */
  #shopDrawer {
    position: fixed; left: 50%; bottom: 2px; z-index: 12; width: min(64vw, 620px); max-height: 220px;
    transform: translate(-50%, calc(100% + 20px)); transition: transform 0.25s ease; opacity: 0;
  }
  #shopDrawer.open { transform: translate(-50%, 0); opacity: 1; }
  .panel {
    background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.55); pointer-events: auto; color: var(--text);
    padding: 8px 10px; overflow-y: auto;
  }
  #shopDrawer h3 { margin: 0 0 6px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  #shopDrawer h3 button {
    background: var(--accent-green); color: #0c1a10; border: 1px solid #3a8a56; border-radius: 6px;
    padding: 4px 10px; cursor: pointer; font-size: 12px;
  }
  #shopDrawer h3 button:disabled { background: #444; border-color: #555; color: #999; cursor: not-allowed; }
  #shopCloseBtn { background: #262a33 !important; color: var(--text) !important; border-color: var(--panel-border) !important; }
  #shopCards { display: flex; gap: 6px; flex-wrap: wrap; }
  .subcount { font-weight: normal; color: var(--text-dim); font-size: 11px; }
  .card {
    width: 62px; background: var(--card-bg); border: 2px solid var(--card-border); border-radius: 6px; overflow: hidden;
    text-align: center; cursor: pointer; font-size: 10px; user-select: none; flex-shrink: 0; position: relative; color: var(--text);
  }
  .card img { width: 100%; height: 56px; object-fit: cover; display: block; background: #333; }
  .card .name { padding: 2px 2px 0; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 9px; }
  .card .tags { padding: 0 2px; color: var(--accent-green); font-size: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card .cost { padding: 0 2px 3px; color: var(--accent); font-weight: bold; }
  .card.disabled { opacity: 0.4; cursor: not-allowed; }
  .card.selected { border-color: var(--accent-red); box-shadow: 0 0 0 2px var(--accent-red); }
  /* ----- Equipment Core: inventory bar / equip-open button / drag ghost / equip modal ----- */
  .equipBtn {
    position: absolute; top: 2px; right: 2px; background: rgba(10,11,14,0.85); color: var(--text);
    border: 1px solid var(--card-border); border-radius: 4px; font-size: 10px; padding: 1px 3px; cursor: pointer;
    line-height: 1.2; z-index: 2;
  }
  .sellBtn {
    position: absolute; top: 2px; left: 2px; background: rgba(10,11,14,0.85); color: var(--accent);
    border: 1px solid var(--card-border); border-radius: 4px; font-size: 9px; padding: 1px 3px; cursor: pointer;
    line-height: 1.2; z-index: 2;
  }
  .teamHpRow .equipBtn, .teamHpRow .sellBtn { top: 4px; }
  /* ----- กระเป๋าไอเทม: แผงด้านขวา พับเก็บได้ด้วย #bagToggleBtn ----- */
  #bagToggleBtn { position: fixed; right: 10px; bottom: 144px; z-index: 9; }
  #inventoryPanel {
    position: fixed; right: 10px; bottom: 184px; z-index: 8; width: min(60vw, 360px);
    pointer-events: none; transition: transform 0.2s ease, opacity 0.2s ease; transform-origin: bottom right;
  }
  #inventoryPanel.collapsed { transform: translateX(120%); opacity: 0; }
  #inventoryPanel .panel { pointer-events: auto; padding: 6px 8px; max-height: 96px; }
  #inventoryPanel h3 { margin: 0 0 4px; font-size: 12px; }
  #inventoryCards, #equipModalInventory { display: flex; gap: 5px; overflow-x: auto; max-width: 100%; }
  .itemCard {
    width: 46px; flex-shrink: 0; background: var(--card-bg); border: 2px solid var(--card-border); border-radius: 6px;
    text-align: center; font-size: 9px; user-select: none; padding: 3px 2px; cursor: grab; color: var(--text);
  }
  .itemCard .itemIcon { font-size: 18px; line-height: 1.15; }
  .itemCard .itemName { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .itemGhost {
    position: fixed; z-index: 85; pointer-events: none; width: 46px; height: 46px;
    display: flex; align-items: center; justify-content: center;
    background: var(--card-bg); border: 2px solid var(--card-border); border-radius: 8px; font-size: 18px;
    box-shadow: 0 4px 10px #0008; transform: translate(-50%, -50%);
  }
  .itemGhost.returning { transition: left 0.25s ease, top 0.25s ease; }
  #equipModal {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(4,5,7,0.72); z-index: 25;
  }
  #equipBox {
    background: linear-gradient(#1c1f26, #14161b); border: 1px solid var(--panel-border); border-radius: 12px;
    padding: 20px 26px; text-align: center; color: var(--text); min-width: 240px;
  }
  #equipBox h3 { margin: 0 0 12px; }
  #equipSlots { display: flex; gap: 12px; justify-content: center; margin-bottom: 14px; }
  .equipSlot {
    width: 64px; height: 64px; border: 2px dashed var(--panel-border); border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 10px; color: var(--text-dim); background: rgba(255,255,255,0.03);
  }
  .equipSlot.filled { border-style: solid; background: rgba(216,173,77,0.12); cursor: grab; }
  .equipSlot .itemIcon { font-size: 22px; }
  #equipModalInventoryWrap { margin-bottom: 14px; }
  #equipModalInventoryWrap h4 { margin: 0 0 6px; font-size: 12px; color: var(--text-dim); text-align: left; }
  #equipCloseBtn {
    background: var(--accent); color: #1a1408; border: 1px solid var(--accent-dim);
    border-radius: 8px; font-size: 14px; font-weight: bold; padding: 8px 22px; cursor: pointer;
  }
  /* ----- Evolution System: player-choice merge modal ----- */
  #evolutionModal {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(4,5,7,0.82); z-index: 26;
  }
  #evolutionBox {
    background: linear-gradient(#1c1f26, #14161b); border: 1px solid var(--accent); border-radius: 12px;
    padding: 24px 30px; text-align: center; color: var(--text); min-width: 300px;
  }
  #evolutionBox h3 { margin: 0 0 4px; }
  #evolutionBox .evoSub { color: var(--text-dim); font-size: 12px; margin-bottom: 16px; }
  #evolutionOptions { display: flex; gap: 16px; justify-content: center; }
  .evoOption {
    width: 110px; background: var(--card-bg); border: 2px solid var(--card-border); border-radius: 8px; overflow: hidden;
    cursor: pointer; text-align: center; font-size: 11px; user-select: none; padding-bottom: 6px; color: var(--text);
  }
  .evoOption:hover { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
  .evoOption img { width: 100%; height: 90px; object-fit: cover; display: block; background: #333; }
  .evoOption .name { font-weight: bold; padding: 6px 2px 0; }
  .evoOption .tags { color: var(--accent-green); padding: 0 2px; font-size: 10px; }
  /* drag-to-place ghost: floats above the pointer (offset applied in JS) so the
     sprite doesn't cover the tile the player is about to drop on, and reads a touch
     smaller than the bench card it came from */
  .benchGhost { position: fixed; width: 50px; height: 50px; pointer-events: none; z-index: 80;
    transform: translate(-50%, -50%) scale(0.86); border-radius: 10px; overflow: hidden;
    background: #333; box-shadow: 0 4px 10px #0008, 0 0 0 2px var(--accent); }
  .benchGhost img { width: 100%; height: 100%; object-fit: cover; display: block; }
  /* ----- มุมล่างซ้าย (Lv./ซื้อ EXP) และมุมล่างขวา (Toggle Shop / เริ่มการต่อสู้) ----- */
  .hudCorner { position: fixed; bottom: 2px; z-index: 9; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
  .hudCorner > * { pointer-events: auto; }
  #bottomLeft { left: 10px; align-items: flex-start; }
  #bottomRight { right: 10px; align-items: stretch; width: 150px; }
  #startBattleBtn {
    pointer-events: auto; background: var(--accent); color: #1a1408;
    border: 1px solid var(--accent-dim); border-radius: 10px; font-size: 15px; font-weight: bold;
    padding: 12px 14px; cursor: pointer; letter-spacing: 0.5px;
  }
  #startBattleBtn:disabled { background: #444; border-color: #555; color: #999; cursor: not-allowed; }
  #shopToggleBtn.active { background: var(--accent-dim); color: #1a1408; }

  /* ----- โมดัลผลลัพธ์ ----- */
  #resultModal {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(4,5,7,0.75); z-index: 20;
  }
  #resultBox {
    background: linear-gradient(#1c1f26, #14161b); border: 1px solid var(--panel-border); border-radius: 12px;
    padding: 30px 50px; text-align: center; color: var(--text);
  }
  #resultBox h2 { margin: 0 0 10px; font-size: 28px; }
  #resultBox p { margin: 4px 0 18px; color: var(--text-dim); }
  #resultBox button {
    background: var(--accent); color: #1a1408; border: 1px solid var(--accent-dim);
    border-radius: 8px; font-size: 16px; font-weight: bold; padding: 10px 28px; cursor: pointer;
  }

  /* ----- Responsive: มือถือแนวนอน (จอเตี้ย, ความสูง <= 430px) — ย่อแผง/ปุ่มลงเล็กน้อยกันล้นจอ ----- */
  @media (max-height: 430px) {
    .floatPanel { max-height: 40vh; padding: 6px; }
    .floatPanel h3 { font-size: 11px; margin-bottom: 6px; }
    .pill { padding: 4px 10px; font-size: 13px; }
    #topbar button, .hudCorner button, #shopToggleBtn, #bagToggleBtn { padding: 5px 9px; font-size: 12px; }
    #startBattleBtn { padding: 9px 10px; font-size: 13px; }
    #shopDrawer { max-height: 100px; }
  }
  /* ----- Responsive: แท็บเล็ต/ไอแพด (จอกว้าง >= 900px) — ขยายแผง/ตัวอักษรขึ้นเล็กน้อย ไม่ให้เล็กจิ๋วบนจอใหญ่ ----- */
  @media (min-width: 900px) {
    .floatPanel { width: clamp(165px, 15vw, 220px); padding: 12px; }
    .floatPanel h3 { font-size: 14px; }
    #shopDrawer { width: min(52vw, 640px); }
    .pill, #startBattleBtn, #shopToggleBtn, #bagToggleBtn { font-size: 16px; }
  }
</style>
</head>
<body>
<div id="loading">กำลังเตรียมสนามประลอง...</div>

<div id="boardContainer"></div>

<div id="topbar">
  <div id="topbarLeft"><a id="back" href="index.html"><button>&larr; เมนู</button></a></div>
  <div id="topbarCenter">
    <div class="pill">💰 <span id="goldLabel">0</span></div>
    <div class="pill">🌊 ด่าน <span id="waveLabel">1</span>/<span id="waveTotal">3</span></div>
    <div class="pill" id="livesPill">❤️ <span id="livesLabel">3</span>/<span id="livesTotal">3</span></div>
    <div class="pill" id="phaseLabel">เตรียมทีม</div>
    <div class="pill" id="stageLabel" style="display:none"></div>
  </div>
  <div id="topbarRight">
    <button id="speedBtn">x1</button>
    <button id="pauseBtn">⏸ หยุด</button>
  </div>
</div>

<div id="synergyPanel" class="floatPanel">
  <h3>โบนัสอาชีพ</h3>
  <div id="synergyList"></div>
  <h3 style="margin-top:10px">บัฟทีม 3 คน <span id="teamComboCount" class="subcount"></span></h3>
  <div id="teamComboSection"></div>
</div>
<div id="hpPanel" class="floatPanel">
  <h3>ทีมในสนาม <span id="fieldCount" class="subcount"></span></h3>
  <div id="teamHpList"></div>
</div>

<button id="bagToggleBtn" title="กระเป๋าไอเทม">🎒 กระเป๋า</button>
<div id="inventoryPanel" class="collapsed">
  <div class="panel">
    <h3>กระเป๋าไอเทม <span id="invCount" class="subcount"></span></h3>
    <div id="inventoryCards"></div>
  </div>
</div>

<div id="bottomLeft" class="hudCorner">
  <div class="pill">⭐ Lv.<span id="levelLabel">1</span> <span id="expLabel">(0/4)</span></div>
  <button id="buyExpBtn">ซื้อ EXP</button>
</div>

<!-- ม้านั่งสำรองรวมเป็นแถวล่างสุดของกระดาน 3D แล้ว (ดูสีเข้มแยกโซนในฉาก) — เหลือแค่แถบลอยเล็กๆ
     บอกสถานะ (hint) หรือปุ่มไอเทม/ขาย เมื่อแตะเลือกฮีโร่ไว้ (สลับกันแสดงทีละอัน ดูใน renderUI) -->
<div class="panel" id="hintBar" style="display:none;"><span id="hintText"></span></div>
<div class="panel" id="selectedUnitBar" style="display:none;">
  <span id="selectedUnitName"></span>
  <button id="selectedUnitEquipBtn">⚙ ไอเทม</button>
  <button id="selectedUnitSellBtn">💰 ขาย</button>
  <button id="selectedUnitCancelBtn">✕</button>
</div>

<div class="panel" id="shopDrawer">
  <h3>ร้านค้า <span><button id="rerollBtn">รีโรล (2💰)</button> <button id="shopCloseBtn">✕</button></span></h3>
  <div id="shopCards"></div>
</div>

<div id="bottomRight" class="hudCorner">
  <button id="shopToggleBtn">🛒 ร้านค้า</button>
  <button id="startBattleBtn">⚔ เริ่มการต่อสู้</button>
</div>

<div id="resultModal">
  <div id="resultBox">
    <h2 id="resultTitle"></h2>
    <p id="resultBody"></p>
    <button id="resultBtn">ไปต่อ</button>
  </div>
</div>

<div id="equipModal">
  <div id="equipBox">
    <h3 id="equipHeroName"></h3>
    <div id="equipSlots"></div>
    <div id="equipModalInventoryWrap">
      <h4>กระเป๋าไอเทม — ลากมาใส่ช่องด้านบน</h4>
      <div id="equipModalInventory"></div>
    </div>
    <button id="equipCloseBtn">ปิด</button>
  </div>
</div>

<div id="evolutionModal">
  <div id="evolutionBox">
    <h3>🌟 <span id="evolutionSourceName"></span> พร้อมเปลี่ยนคลาส!</h3>
    <div class="evoSub">รวม 3 ตัวสำเร็จ — เลือกคลาส Tier-2 (ไอเทมที่เก็บมา <span id="evolutionItemCount">0</span> ชิ้น จะสวมให้อัตโนมัติสูงสุด 2 ชิ้น ที่เหลือกลับกระเป๋า)</div>
    <div id="evolutionOptions"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" onerror="document.getElementById('loading').textContent='โหลดไลบรารีกราฟิก (Three.js) ไม่สำเร็จ — เช็คการเชื่อมต่ออินเทอร์เน็ต/Ad-blocker แล้วรีเฟรชหน้านี้ใหม่';"></script>
<script src="src/game.js"></script>
</body>
</html>
