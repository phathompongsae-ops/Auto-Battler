<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Auto Battler Phase 1 V3</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#08100b;color:#f7e9c1;font-family:system-ui,sans-serif;touch-action:none}button{font:inherit}.app{position:fixed;inset:0;background:radial-gradient(circle at 50% 42%,#597a45 0 22%,#243d2b 50%,#09120d 82%)}#top{position:absolute;left:8px;right:8px;top:7px;height:42px;display:flex;align-items:center;gap:7px;z-index:30}.pill{padding:7px 11px;border:1px solid #b68a43;border-radius:18px;background:#15130fe8;font-size:12px;white-space:nowrap}.grow{flex:1}.tool{width:40px;height:36px;border:1px solid #b68a43;border-radius:9px;background:#282117;color:#ffe6a0;font-weight:900}#arena{position:absolute;left:2%;right:2%;top:10%;bottom:31%;display:flex;align-items:center;justify-content:center}#boardWrap{width:min(72vh,76vw);aspect-ratio:1;transform-origin:center;position:relative}#board{position:absolute;inset:0;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);transform:rotateX(52deg);transform-origin:center;filter:drop-shadow(0 18px 18px #000b)}.cell{position:relative;border:1px solid #efd79f3b;background:#4b754a}.cell:nth-child(even){background:#3d633e}.cell.player{box-shadow:inset 0 0 0 2px #64e18b55}.cell.drop{background:#9dc55c!important;box-shadow:inset 0 0 0 3px #fff08a}.unit{position:absolute;left:5%;bottom:3%;width:90%;height:120%;z-index:5;transform:rotateX(-52deg);transform-origin:bottom center;filter:drop-shadow(0 6px 4px #000a);animation:idle 1s ease-in-out infinite alternate}.unit.enemy{filter:drop-shadow(0 6px 5px #600d)}.unit.attack{animation:attack .3s}.unit.hit{animation:hit .16s 2}.unit.dead{animation:dead .45s forwards}.unit svg{width:100%;height:100%;overflow:visible}.hp{position:absolute;left:10%;right:10%;top:-2px;height:5px;background:#3a0e0e;border:1px solid #000;transform:rotateX(-52deg);z-index:8}.hp i{display:block;height:100%;background:#55d76b}.enemy .hp i{background:#e6534b}@keyframes idle{to{transform:rotateX(-52deg) translateY(-4px)}}@keyframes attack{50%{transform:rotateX(-52deg) translateY(-13px) scale(1.12)}}@keyframes hit{50%{filter:brightness(2) drop-shadow(0 0 10px #fff)}}@keyframes dead{to{opacity:0;transform:rotateX(-52deg) translateY(15px) scale(.3)}}#benchWrap{position:absolute;left:50%;bottom:98px;transform:translateX(-50%);z-index:26;padding:5px 7px 7px;border:1px solid #9e783f;border-radius:11px;background:#12100de8;box-shadow:0 5px 16px #0008}#benchTitle{text-align:center;font-size:10px;color:#ffe3a1;margin-bottom:4px}#bench{display:grid;grid-template-columns:repeat(6,54px);gap:4px}.slot{position:relative;width:54px;height:56px;border:2px solid #5f4a2d;border-radius:7px;background:#241d14;overflow:hidden;touch-action:none}.slot.filled{border-color:#bc9147}.slot.selected{border-color:#ffe06b;box-shadow:0 0 12px #ffd85d}.slot svg{width:100%;height:100%}.slot b{position:absolute;left:1px;right:1px;bottom:0;background:#000b;text-align:center;font-size:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.slot .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#6f5b3c;font-weight:800}#bottom{position:absolute;left:0;right:0;bottom:0;height:92px;z-index:24;display:flex;border-top:1px solid #725832;background:#0c0a08f2;padding-right:170px}#shop{display:flex;gap:6px;overflow-x:auto;padding:7px;flex:1}.card{width:76px;min-width:76px;border:1px solid #b18b49;border-radius:8px;background:#ead8af;color:#281f13;padding:3px;text-align:center}.portrait{height:42px}.portrait svg{width:100%;height:100%}.card small{display:block;font-size:9px}.card button{width:100%;border:0;border-radius:5px;background:#654921;color:#fff0c0;padding:4px;font-size:10px}.card button:disabled{opacity:.45}.actions{position:absolute;right:7px;bottom:7px;width:158px;height:80px;z-index:28;display:grid;grid-template-columns:1fr 1fr;gap:5px}.actions button{border:1px solid #a78142;border-radius:8px;background:#382a1a;color:#ffe8aa;font-weight:800;font-size:10px}.actions #start{grid-column:1/3;background:#be8d2c;color:#20170c;font-size:13px}.actions button:disabled{opacity:.45}#toast{position:absolute;left:50%;top:33%;transform:translate(-50%,-50%) scale(.8);opacity:0;z-index:50;padding:13px 20px;border:2px solid #e6c267;border-radius:13px;background:#17130ff2;font-weight:900;transition:.18s;pointer-events:none}.show{opacity:1!important;transform:translate(-50%,-50%) scale(1)!important}.dragGhost{position:fixed;width:64px;height:72px;z-index:100;pointer-events:none;transform:translate(-50%,-60%);filter:drop-shadow(0 7px 6px #000b);opacity:.92}.dragGhost svg{width:100%;height:100%}@media(max-width:760px){#arena{bottom:32%}#bench{grid-template-columns:repeat(6,45px)}.slot{width:45px;height:47px}#benchWrap{bottom:93px;padding:4px 5px 5px}#bottom{height:87px;padding-right:145px}.actions{width:138px;height:75px}.pill{font-size:10px;padding:6px 8px}.tool{width:36px}.card{width:66px;min-width:66px}.portrait{height:37px}}</style></head><body><div class="app"><div id="top"><div class="pill">💰 <b id="gold">3</b></div><div class="pill">กระดาน Lv.<b id="level">1</b> • <b id="used">0</b>/<b id="cap">1</b></div><div class="pill">EXP <b id="exp">0</b>/<b id="need">4</b></div><div class="grow"></div><button class="tool" id="zoomOut">−</button><button class="tool" id="zoomIn">＋</button><button class="tool" id="reset">⌂</button></div><div id="arena"><div id="boardWrap"><div id="board"></div></div></div><div id="benchWrap"><div id="benchTitle">ม้านั่งสำรอง 0/6</div><div id="bench"></div></div><div id="bottom"><div id="shop"></div></div><div class="actions"><button id="buyExp">ซื้อ EXP<br>4💰</button><button id="reroll">รีโรล<br>2💰</button><button id="start">เริ่มต่อสู้</button></div><div id="toast"></div></div><script>const COL=['#4d81c7','#b64f32','#4e8853','#7350a2'];function heroSvg(i){const p=COL[i],hair=['#182845','#7a2d18','#6d4a27','#4c2c74'][i],w=i===0?'<path d="M67 20l5 3-30 54-6-4z" fill="#dce8ef" stroke="#6b5324" stroke-width="2"/>':i===1?'<path d="M72 18c-17 5-22 32-18 58" fill="none" stroke="#d6b45e" stroke-width="4"/><path d="M70 19L48 77" stroke="#eee"/>':i===2?'<path d="M67 18l5 2-11 55-5-1z" fill="#50391e"/><circle cx="69" cy="19" r="9" fill="#6ce281" stroke="#28452b" stroke-width="3"/>':'<path d="M66 15l5 2-13 57-5-1z" fill="#3c2c23"/><circle cx="69" cy="16" r="9" fill="#a777ff" stroke="#e0bd5b" stroke-width="3"/>';return `<svg viewBox="0 0 90 100"><ellipse cx="45" cy="91" rx="28" ry="7" fill="#0005"/>${w}<path d="M31 50Q45 38 59 50l8 35H23z" fill="${p}" stroke="#d5b55b" stroke-width="3"/><circle cx="45" cy="35" r="17" fill="#f2c6a4" stroke="#3b2a20" stroke-width="2"/><path d="M28 35Q29 13 45 12q19 2 18 25-9-12-17-10-7 6-18 8" fill="${hair}"/><circle cx="39" cy="36" r="2"/><circle cx="51" cy="36" r="2"/><path d="M38 45q7 5 14 0" fill="none" stroke="#8a4b40"/><path d="M27 58l-10 18M63 58l10 18" stroke="#f2c6a4" stroke-width="6" stroke-linecap="round"/><path d="M35 84l-5 12M55 84l5 12" stroke="#2d2925" stroke-width="7"/></svg>`}function enemySvg(i){const c=['#d8d2bf','#58616a','#436d55','#34234f'][i%4];return `<svg viewBox="0 0 90 100"><ellipse cx="45" cy="91" rx="27" ry="7" fill="#0005"/><path d="M27 53q18-18 36 0l6 33H21z" fill="${c}" stroke="#1e2420" stroke-width="3"/><circle cx="45" cy="35" r="17" fill="${c}" stroke="#1e2420" stroke-width="3"/><circle cx="39" cy="36" r="3"/><circle cx="51" cy="36" r="3"/><path d="M28 61L14 75M62 61l14 14" stroke="${c}" stroke-width="7"/><path d="M35 84l-4 12M55 84l4 12" stroke="#282a28" stroke-width="7"/></svg>`}const H=[{n:'Swordman',i:0,hp:135,atk:25},{n:'Archer',i:1,hp:108,atk:22},{n:'Acolyte',i:2,hp:122,atk:18},{n:'Mage',i:3,hp:98,atk:30}];let gold=3,level=1,exp=0,bench=[],field=[],selected=-1,battle=false,zoom=1,panX=0,panY=0,offers=[];const req={1:4,2:8,3:12,4:16};const board=document.querySelector('#board'),benchEl=document.querySelector('#bench'),shop=document.querySelector('#shop'),wrap=document.querySelector('#boardWrap'),toast=document.querySelector('#toast'),benchTitle=document.querySelector('#benchTitle');function toastMsg(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1100)}function cidx(c,r){return r*8+c}function getCell(c,r){return board.children[cidx(c,r)]}function renderBoard(){board.innerHTML='';for(let r=0;r<8;r++)for(let c=0;c<8;c++){const d=document.createElement('div');d.className='cell'+(r>=5?' player':'');d.dataset.c=c;d.dataset.r=r;d.onclick=()=>placeSelected(c,r);board.appendChild(d)}field.forEach((u,k)=>{const d=document.createElement('div');d.className='unit';d.innerHTML=heroSvg(u.i)+'<div class="hp"><i></i></div>';d.onclick=e=>{e.stopPropagation();if(bench.length>=6){toastMsg('ม้านั่งสำรองเต็ม 6 ช่อง');return}field.splice(k,1);bench.push(u);selected=-1;render()};getCell(u.c,u.r).appendChild(d)})}let drag=null,ghost=null;function beginDrag(ev,i){if(!bench[i]||battle)return;ev.preventDefault();selected=i;ghost=document.createElement('div');ghost.className='dragGhost';ghost.innerHTML=heroSvg(bench[i].i);document.body.appendChild(ghost);drag={i,pid:ev.pointerId};moveGhost(ev);ev.currentTarget.setPointerCapture?.(ev.pointerId);renderBench()}function moveGhost(ev){if(!ghost)return;ghost.style.left=ev.clientX+'px';ghost.style.top=ev.clientY+'px';document.querySelectorAll('.cell.drop').forEach(x=>x.classList.remove('drop'));const el=document.elementFromPoint(ev.clientX,ev.clientY)?.closest?.('.cell.player');if(el)el.classList.add('drop')}function endDrag(ev){if(!drag)return;const el=document.elementFromPoint(ev.clientX,ev.clientY)?.closest?.('.cell.player');if(el)placeSelected(+el.dataset.c,+el.dataset.r);ghost?.remove();ghost=null;drag=null;document.querySelectorAll('.cell.drop').forEach(x=>x.classList.remove('drop'))}addEventListener('pointermove',e=>{if(drag)moveGhost(e)},{passive:false});addEventListener('pointerup',endDrag);function renderBench(){benchEl.innerHTML='';benchTitle.textContent='ม้านั่งสำรอง '+bench.length+'/6';for(let i=0;i<6;i++){const s=document.createElement('div');s.className='slot'+(bench[i]?' filled':'')+(selected===i?' selected':'');if(bench[i]){s.innerHTML=heroSvg(bench[i].i)+'<b>'+bench[i].n+'</b>';s.onpointerdown=e=>beginDrag(e,i);s.onclick=()=>{selected=selected===i?-1:i;renderBench()}}else s.innerHTML='<span class="num">'+(i+1)+'</span>';benchEl.appendChild(s)}}function makeOffers(){offers=Array.from({length:4},()=>H[Math.floor(Math.random()*H.length)])}function renderShop(){shop.innerHTML='';offers.forEach(h=>{const c=document.createElement('div');c.className='card';c.innerHTML='<div class="portrait">'+heroSvg(h.i)+'</div><small>'+h.n+'</small><button>ซื้อ 2💰</button>';const b=c.querySelector('button');b.disabled=gold<2||bench.length>=6||battle;b.onclick=()=>{if(b.disabled)return;gold-=2;bench.push({...h});render()};shop.appendChild(c)})}function placeSelected(c,r){if(selected<0||!bench[selected]||battle)return;if(r<5){toastMsg('วางได้เฉพาะพื้นที่สีเขียวด้านล่าง');return}if(field.length>=level){toastMsg('กระดาน Lv.'+level+' ลงได้ '+level+' ตัว');return}if(field.some(u=>u.c===c&&u.r===r)){toastMsg('ช่องนี้มีตัวละครแล้ว');return}const u=bench.splice(selected,1)[0];u.c=c;u.r=r;field.push(u);selected=-1;render()}function render(){renderBoard();renderBench();renderShop();goldEl.textContent=gold;levelEl.textContent=level;usedEl.textContent=field.length;capEl.textContent=level;expEl.textContent=exp;needEl.textContent=level<5?req[level]:'MAX';buyExp.disabled=gold<4||level>=5||battle;reroll.disabled=gold<2||battle;start.disabled=!field.length||battle;wrap.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`}const goldEl=document.querySelector('#gold'),levelEl=document.querySelector('#level'),usedEl=document.querySelector('#used'),capEl=document.querySelector('#cap'),expEl=document.querySelector('#exp'),needEl=document.querySelector('#need'),buyExp=document.querySelector('#buyExp'),reroll=document.querySelector('#reroll'),start=document.querySelector('#start');buyExp.onclick=()=>{if(gold<4||level>=5||battle)return;gold-=4;exp+=4;while(level<5&&exp>=req[level]){exp-=req[level];level++;toastMsg('กระดานเลเวล '+level)}render()};reroll.onclick=()=>{if(gold<2||battle)return;gold-=2;makeOffers();render()};start.onclick=()=>{if(!field.length||battle)return;battle=true;render();runBattle()};function runBattle(){const enemies=[{i:0,c:2,r:1,hp:55},{i:1,c:4,r:1,hp:62}];renderBoard();enemies.forEach((e,k)=>{const d=document.createElement('div');d.className='unit enemy';d.innerHTML=enemySvg(e.i)+'<div class="hp"><i></i></div>';getCell(e.c,e.r).appendChild(d);setTimeout(()=>d.classList.add('hit'),500+k*250);setTimeout(()=>d.classList.add('dead'),900+k*250)});field.forEach((u,k)=>{const d=getCell(u.c,u.r).querySelector('.unit');setTimeout(()=>d?.classList.add('attack'),300+k*120)});setTimeout(()=>{gold+=5;battle=false;toastMsg('ชนะ +5 ทอง');makeOffers();render()},1800)}let pan=null;document.querySelector('#arena').addEventListener('pointerdown',e=>{if(e.target.closest('.unit')||e.target.closest('.cell'))return;pan={x:e.clientX,y:e.clientY,px:panX,py:panY}});addEventListener('pointermove',e=>{if(!pan||drag)return;panX=Math.max(-90,Math.min(90,pan.px+e.clientX-pan.x));panY=Math.max(-50,Math.min(50,pan.py+e.clientY-pan.y));render()});addEventListener('pointerup',()=>pan=null);zoomIn.onclick=()=>{zoom=Math.min(1.3,zoom+.1);render()};zoomOut.onclick=()=>{zoom=Math.max(.8,zoom-.1);render()};reset.onclick=()=>{zoom=1;panX=panY=0;render()};makeOffers();render();toastMsg('เริ่มด้วย 3 เหรียญ • ซื้อฮีโร่ตัวแรกก่อน');</script></body></html>
