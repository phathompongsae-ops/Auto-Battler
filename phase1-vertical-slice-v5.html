<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Auto Battler Phase 1 V5</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#060906}iframe{width:100%;height:100%;border:0;display:block;background:#060906}#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0b100d;color:#f4deb0;font:700 16px system-ui;z-index:5}</style></head><body><div id="loading">กำลังแก้ระบบลากบนมือถือ…</div><iframe id="game" src="phase1-vertical-slice-v3.html?build=v5-drag-fix"></iframe><script>(()=>{const f=document.getElementById('game'),loading=document.getElementById('loading');function install(){try{const w=f.contentWindow,d=f.contentDocument;if(!d||!d.querySelector('#board')||typeof w.renderBench!=='function')return setTimeout(install,180);const s=d.createElement('style');s.textContent=`html,body{background:#08100b!important}.app{background:radial-gradient(circle at 50% 45%,#6f8f53 0 28%,#2b4631 55%,#0a130e 86%)!important}#top{height:34px!important;top:3px!important;left:6px!important;right:6px!important;gap:5px!important}.pill{padding:4px 8px!important;font-size:10px!important;background:#11110dcc!important}.tool{width:32px!important;height:30px!important;border-radius:50%!important;font-size:17px!important}#arena{left:2%!important;right:2%!important;top:8%!important;bottom:23%!important;display:flex!important;align-items:center!important;justify-content:center!important}#boardWrap{width:min(94vw,80vh)!important;max-width:none!important}#board{transform:rotateX(47deg)!important;border:8px solid #9aa27b55!important;border-radius:18px!important;overflow:hidden!important;box-shadow:0 14px 34px #000b,0 0 0 2px #d4c58f55 inset!important}.cell{border-color:#d8cda45c!important}.cell.player{box-shadow:inset 0 0 0 2px #6fe89a77!important}#bench{position:fixed!important;left:50%!important;bottom:88px!important;transform:translateX(-50%)!important;z-index:35!important;display:grid!important;grid-template-columns:repeat(6,45px)!important;gap:4px!important;width:auto!important;height:auto!important;padding:5px!important;border:2px solid #9c7941!important;border-radius:10px!important;background:#17120edc!important;box-shadow:0 6px 18px #000!important}.slot{width:45px!important;height:47px!important;aspect-ratio:auto!important;touch-action:none!important}.slot .num{font-size:14px!important}#bottom{height:82px!important;padding:5px 136px 5px 6px!important;background:#0b0a08ed!important;border-top:1px solid #816538!important}#shop{gap:4px!important;padding:3px!important}.card{width:62px!important;min-width:62px!important;padding:2px!important}.portrait{height:33px!important}.card small{font-size:8px!important}.card button{font-size:9px!important;padding:3px!important}.actions{position:fixed!important;right:6px!important;bottom:5px!important;width:128px!important;height:72px!important;z-index:40!important;display:grid!important;grid-template-columns:1fr 1fr!important;gap:4px!important}.actions #start{grid-column:1/3!important;font-size:12px!important}.actions button{font-size:9px!important}#tip{display:none!important}#toast{left:50%!important;top:24%!important}.dragGhost{width:56px!important;height:64px!important;z-index:9999!important;pointer-events:none!important}.cell.drop{background:#a9cf64!important;box-shadow:inset 0 0 0 4px #fff198!important}`;d.head.appendChild(s);w.eval(`(()=>{let mobileDrag=null,mobileGhost=null,moved=false;function clearDrop(){document.querySelectorAll('.cell.drop').forEach(x=>x.classList.remove('drop'))}function hitCell(x,y){let best=null;document.querySelectorAll('.cell.player').forEach(el=>{const r=el.getBoundingClientRect();if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)best=el});return best}function ghostMove(x,y){if(!mobileGhost)return;mobileGhost.style.left=x+'px';mobileGhost.style.top=y+'px';clearDrop();const el=hitCell(x,y);if(el)el.classList.add('drop')}function cleanup(){mobileGhost?.remove();mobileGhost=null;mobileDrag=null;moved=false;clearDrop()}function beginMobile(ev,i){if(!bench[i]||battle)return;ev.preventDefault();ev.stopPropagation();selected=i;moved=false;mobileDrag={i,id:ev.pointerId,sx:ev.clientX,sy:ev.clientY};mobileGhost=document.createElement('div');mobileGhost.className='dragGhost';mobileGhost.innerHTML=heroSvg(bench[i].i);document.body.appendChild(mobileGhost);ghostMove(ev.clientX,ev.clientY);renderBench()}function moveMobile(ev){if(!mobileDrag||ev.pointerId!==mobileDrag.id)return;ev.preventDefault();if(Math.abs(ev.clientX-mobileDrag.sx)+Math.abs(ev.clientY-mobileDrag.sy)>7)moved=true;ghostMove(ev.clientX,ev.clientY)}function endMobile(ev){if(!mobileDrag||ev.pointerId!==mobileDrag.id)return;ev.preventDefault();const el=hitCell(ev.clientX,ev.clientY);if(el&&moved){const c=+el.dataset.c,r=+el.dataset.r;cleanup();placeSelected(c,r);return}const idx=mobileDrag.i;cleanup();selected=selected===idx?-1:idx;renderBench()}window.renderBench=function(){benchEl.innerHTML='';for(let i=0;i<6;i++){const s=document.createElement('div');s.className='slot'+(bench[i]?' filled':'')+(selected===i?' selected':'');if(bench[i]){s.innerHTML=heroSvg(bench[i].i)+'<b>'+bench[i].n+'</b>';s.addEventListener('pointerdown',e=>beginMobile(e,i),{passive:false})}else s.innerHTML='<span class="num">'+(i+1)+'</span>';benchEl.appendChild(s)}};window.addEventListener('pointermove',moveMobile,{passive:false});window.addEventListener('pointerup',endMobile,{passive:false});window.addEventListener('pointercancel',cleanup,{passive:false});document.addEventListener('visibilitychange',()=>{if(document.hidden)cleanup()});render();})();`);const note=d.createElement('div');note.textContent='ลากจาก Bench ลงช่องสีเขียว หรือแตะฮีโร่แล้วแตะช่อง';note.style.cssText='position:fixed;top:40px;left:50%;transform:translateX(-50%);z-index:50;padding:4px 10px;border-radius:13px;background:#11110dcc;border:1px solid #8a6c40;color:#f6e3ae;font:700 10px system-ui;pointer-events:none';d.body.appendChild(note);loading.style.display='none'}catch(e){console.error(e);setTimeout(install,300)}}f.addEventListener('load',()=>setTimeout(install,250));setTimeout(install,900)})();</script></body></html>
