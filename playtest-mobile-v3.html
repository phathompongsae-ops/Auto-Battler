<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Auto Battler Mobile V3</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#080604;touch-action:none}#stage{position:fixed;left:50%;top:50%;width:960px;height:540px;transform-origin:center center;background:#14100c}iframe{display:block;width:960px;height:540px;border:0}#rotate{display:none;position:fixed;inset:0;align-items:center;justify-content:center;text-align:center;padding:30px;background:#14100c;color:#f0e6c8;font:700 22px/1.5 sans-serif}@media(orientation:portrait){#stage{display:none}#rotate{display:flex}}</style></head><body><div id="stage"><iframe src="autochess-playtest-v3.html?mobile=1"></iframe></div><div id="rotate">กรุณาหมุนมือถือเป็นแนวนอน<br>เพื่อเล่นและลากตัวละครได้สะดวก</div><script>(()=>{const stage=document.getElementById('stage');function fit(){const s=Math.min(innerWidth/960,innerHeight/540);stage.style.transform=`translate(-50%,-50%) scale(${s})`}addEventListener('resize',fit,{passive:true});addEventListener('orientationchange',()=>setTimeout(fit,120),{passive:true});fit()})();</script></body></html>
