<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Auto Battler 2.5D Clean V4</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07110d;color:#f6e5b6;font-family:system-ui,sans-serif;touch-action:none}button{font:inherit}.app{height:100dvh;display:grid;grid-template-rows:44px minmax(0,1fr) 66px calc(118px + env(safe-area-inset-bottom));background:#08130e}.top{display:flex;align-items:center;gap:6px;padding:5px 8px;background:#0a1510;border-bottom:1px solid #735a32;z-index:5}.pill,.icon{border:1px solid #95713e;background:#17130f;color:#f8e5ae;border-radius:14px;padding:6px 9px;font-weight:800;font-size:11px}.icon{border-radius:8px;min-width:38px}.grow{flex:1}.main{min-height:0;display:grid;grid-template-columns:108px minmax(0,1fr) 108px;gap:6px;padding:6px;background:#0d2117}.side{min-height:0;border:1px solid #7b6036;border-radius:10px;background:#11100ddd;padding:7px;overflow:hidden}.side h3{font-size:11px;text-align:center;margin:0 0 6px}.syn,.member{font-size:9px;padding:6px 2px;border-bottom:1px solid #483922}.member{display:flex;align-items:center;gap:4px}.mini{width:24px;height:24px;border-radius:6px;background:#263b2c}.mbar{flex:1;height:5px;background:#30271d;border-radius:4px;overflow:hidden}.mbar i{display:block;height:100%;background:#5cd16b}.boardWrap{position:relative;min-width:0;min-height:0;border:2px solid #8f7447;border-radius:14px;overflow:hidden;background:#183c27;box-shadow:inset 0 0 35px #0007}.boardBg{position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,#76b55c 0,#3f7847 45%,#163d27 75%,#0c2418 100%)}canvas#board{position:absolute;inset:0;width:100%;height:100%;display:block}.wave{position:absolute;left:50%;top:7px;transform:translateX(-50%);padding:5px 12px;border:1px solid #9d7941;border-radius:14px;background:#16120edc;font-weight:900;font-size:11px;pointer-events:none}.start{position:absolute;right:9px;bottom:9px;border:1px solid #ac8339;border-radius:8px;background:#c49331;color:#25180a;font-weight:900;padding:8px 12px}.benchRow{display:flex;align-items:center;justify-content:center;background:#0b160f;border-top:1px solid #705832;border-bottom:1px solid #705832}.bench{display:grid;grid-template-columns:repeat(6,minmax(48px,70px));gap:5px;padding:5px 7px;border:1px solid #82673c;border-radius:10px;background:#16120ee8}.slot{position:relative;height:52px;border:2px solid #58452b;border-radius:9px;background:#261e13;overflow:hidden}.slot.filled{border-color:#be944e}.slot.selected{border-color:#ffe16b;box-shadow:0 0 12px #ffd961}.slot canvas{width:100%;height:100%;display:block}.slot b{position:absolute;left:0;right:0;bottom:0;background:#000b;text-align:center;font-size:8px;padding:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.shopRow{padding:6px 8px calc(6px + env(safe-area-inset-bottom));display:grid;grid-template-columns:112px minmax(0,1fr) 112px;gap:7px;background:#090b08}.round{border:2px solid #9b7539;border-radius:50%;background:radial-gradient(circle,#543b19,#21170d);color:#ffe7a5;font-weight:900;font-size:11px}.shop{display:grid;grid-template-columns:repeat(5,minmax(70px,1fr));gap:5px;min-width:0}.card{border:1px solid #84683a;border-radius:9px;background:#17191c;color:#f2ddb0;padding:4px;text-align:center;overflow:hidden;display:grid;grid-template-rows:48px 16px 14px 27px;gap:2px}.portrait{border-radius:7px;overflow:hidden;background:#27412f}.portrait canvas{width:100%;height:100%;display:block}.card b{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.card small{font-size:8px}.card button{border:0;border-radius:5px;background:#c6922b;color:#21170a;font-weight:900;font-size:10px}.ghost{position:fixed;width:58px;height:68px;pointer-events:none;z-index:99;transform:translate(-50%,-70%);filter:drop-shadow(0 7px 5px #000c)}.ghost canvas{width:100%;height:100%}.toast{position:fixed;left:50%;top:16%;transform:translate(-50%,-50%);padding:8px 14px;border:1px solid #b99145;border-radius:10px;background:#15110deb;opacity:0;transition:.2s;z-index:100;font-weight:900;font-size:11px}.toast.show{opacity:1}@media(max-width:900px){.main{grid-template-columns:94px minmax(0,1fr) 94px}.shopRow{grid-template-columns:100px minmax(0,1fr) 100px}.card{grid-template-rows:42px 14px 12px 25px}.bench{grid-template-columns:repeat(6,minmax(42px,60px))}}@media(max-height:650px){.app{grid-template-rows:40px minmax(0,1fr) 58px calc(104px + env(safe-area-inset-bottom))}.slot{height:44px}.card{grid-template-rows:36px 14px 12px 23px}}
</style></head><body><div class="app"><header class="top"><div class="pill">Lv.<b id="lv">1</b> EXP <b id="xp">0/4</b></div><div class="pill">💰 <b id="gold">3</b></div><div class="pill">👥 <b id="used">0</b>/<b id="cap">1</b></div><div class="grow"></div><button class="icon" id="speed">×1</button><button class="icon" id="reset">⌂</button></header><main class="main"><aside class="side"><h3>SYNERGY</h3><div id="syn"></div></aside><section class="boardWrap" id="boardWrap"><div class="boardBg"></div><canvas id="board"></canvas><div class="wave">WAVE 1-1</div><button class="start" id="start">เริ่มต่อสู้</button></section><aside class="side"><h3>TEAM</h3><div id="team"></div></aside></main><section class="benchRow"><div class="bench" id="bench"></div></section><footer class="shopRow"><button class="round" id="buyXp">BUY EXP<br>4💰</button><div class="shop" id="shop"></div><button class="round" id="refresh">REFRESH<br>2💰</button></footer></div><div class="toast" id="toast"></div><script>
const TYPES=[{n:'Swordman',role:'Warrior',c:'#4169a8',hair:'#6e3d24',skin:'#f0c6a5'},{n:'Archer',role:'Ranger',c:'#3f7d45',hair:'#86552f',skin:'#f1c9aa'},{n:'Acolyte',role:'Forest',c:'#d0ab65',hair:'#c99b6c',skin:'#f5d1b2'},{n:'Mage',role:'Mage',c:'#6a4397',hair:'#3b275b',skin:'#e9bfa2'}];
function face(t,full=false){const c=document.createElement('canvas');c.width=120;c.height=120;const x=c.getContext('2d');x.clearRect(0,0,120,120);x.fillStyle='rgba(0,0,0,.25)';x.beginPath();x.ellipse(60,108,36,7,0,0,7);x.fill();x.fillStyle=t.c;x.beginPath();x.roundRect?x.roundRect(31,60,58,45,18):x.rect(31,60,58,45);x.fill();x.fillStyle=t.skin;x.beginPath();x.arc(60,45,25,0,7);x.fill();x.fillStyle=t.hair;x.beginPath();x.arc(60,39,27,Math.PI,0);x.lineTo(87,53);x.quadraticCurveTo(74,32,60,37);x.quadraticCurveTo(47,31,33,54);x.fill();x.fillStyle='#22170f';x.beginPath();x.arc(51,47,3,0,7);x.arc(69,47,3,0,7);x.fill();x.strokeStyle='#9d5146';x.lineWidth=2;x.beginPath();x.arc(60,55,8,.2,2.9);x.stroke();x.strokeStyle=t.role==='Mage'?'#b980ff':t.role==='Ranger'?'#d8ba64':t.role==='Forest'?'#70d77a':'#dfe7eb';x.lineWidth=5;x.lineCap='round';if(t.role==='Warrior'){x.beginPath();x.moveTo(88,26);x.lineTo(73,91);x.stroke()}if(t.role==='Ranger'){x.beginPath();x.arc(86,62,23,-1.2,1.2);x.stroke()}if(t.role==='Mage'){x.beginPath();x.moveTo(93,28);x.lineTo(82,94);x.stroke();x.fillStyle='#b879ff';x.beginPath();x.arc(94,25,9,0,7);x.fill()}if(t.role==='Forest'){x.beginPath();x.moveTo(94,28);x.lineTo(84,94);x.stroke();x.fillStyle='#70d77a';x.beginPath();x.arc(95,25,9,0,7);x.fill()}return c}
const board=document.getElementById('board'),ctx=board.getContext('2d'),wrap=document.getElementById('boardWrap');let W=0,H=0,dpr=1;const GRID=8;let gold=3,level=1,xp=0,bench=[],field=[],offers=[],selected=-1,battle=false,speed=1;const req={1:4,2:8,3:12,4:16};
function resize(){const r=wrap.getBoundingClientRect();dpr=Math.min(devicePixelRatio||1,2);W=r.width;H=r.height;board.width=Math.round(W*dpr);board.height=Math.round(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);drawBoard()}addEventListener('resize',resize);
function geom(){const padX=W*.12,top=H*.13,bottom=H*.10,bw=W-padX*2,bh=H-top-bottom;return{padX,top,bw,bh,cw:bw/GRID,ch:bh/GRID}}
function drawTree(x,y,s){ctx.fillStyle='#694226';ctx.fillRect(x-3*s,y,6*s,18*s);ctx.fillStyle='#2c7041';ctx.beginPath();ctx.moveTo(x,y-28*s);ctx.lineTo(x-17*s,y+8*s);ctx.lineTo(x+17*s,y+8*s);ctx.fill()}
function drawBoard(){ctx.clearRect(0,0,W,H);const g=ctx.createRadialGradient(W/2,H*.35,10,W/2,H*.4,Math.max(W,H)*.65);g.addColorStop(0,'#77b75c');g.addColorStop(.55,'#3f7c49');g.addColorStop(1,'#173b27');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);for(let i=0;i<18;i++){const a=i/18*Math.PI*2;drawTree(W/2+Math.cos(a)*W*.43,H*.48+Math.sin(a)*H*.42,.65+((i%3)*.1))}const q=geom();ctx.save();ctx.translate(W/2,q.top+q.bh/2);ctx.transform(1,0,-.28,.72,0,0);ctx.translate(-W/2,-(q.top+q.bh/2));for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){const x=q.padX+c*q.cw,y=q.top+r*q.ch;ctx.fillStyle=(r+c)%2?'#8d8d70':'#aaa687';ctx.strokeStyle='#5c6656';ctx.lineWidth=1;ctx.fillRect(x,y,q.cw-1,q.ch-1);ctx.strokeRect(x,y,q.cw-1,q.ch-1);if(r>=5){ctx.fillStyle='rgba(91,210,118,.13)';ctx.fillRect(x,y,q.cw-1,q.ch-1)}}field.forEach((u,i)=>drawUnitIso(u,cx(q,u.c),cy(q,u.r),i));if(battle)for(let i=0;i<Math.min(5,level+1);i++)drawEnemyIso(1+i%5,1+Math.floor(i/5),q,i);ctx.restore()}
function cx(q,c){return q.padX+(c+.5)*q.cw}function cy(q,r){return q.top+(r+.55)*q.ch}function drawUnitIso(u,x,y,i){const im=face(u.type);ctx.save();ctx.translate(x,y);ctx.scale(.7,.7);ctx.drawImage(im,-50,-96,100,100);ctx.fillStyle='#10100c';ctx.fillRect(-30,-100,60,5);ctx.fillStyle='#58d16b';ctx.fillRect(-29,-99,58,3);ctx.restore()}function drawEnemyIso(c,r,q,i){ctx.save();ctx.translate(cx(q,c),cy(q,r));ctx.fillStyle='#6e3f2e';ctx.beginPath();ctx.arc(0,-18,17,0,7);ctx.fill();ctx.fillStyle='#8a6945';ctx.fillRect(-14,-10,28,28);ctx.fillStyle='#111';ctx.fillRect(-20,-42,40,4);ctx.fillStyle='#e75248';ctx.fillRect(-19,-41,38,2);ctx.restore()}
function screenToCell(x,y){const r=board.getBoundingClientRect();if(x<r.left||x>r.right||y<r.top||y>r.bottom)return null;let sx=x-r.left,sy=y-r.top,q=geom();const cy0=q.top+q.bh/2;const ux=sx+.28*((sy-cy0)/.72);const uy=cy0+(sy-cy0)/.72;const c=Math.floor((ux-q.padX)/q.cw),rr=Math.floor((uy-q.top)/q.ch);return c>=0&&c<8&&rr>=0&&rr<8?{c,r:rr}:null}
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1000)}function offersNew(){offers=Array.from({length:5},()=>TYPES[Math.floor(Math.random()*TYPES.length)])}
function render(){document.getElementById('gold').textContent=gold;document.getElementById('lv').textContent=level;document.getElementById('xp').textContent=level<5?xp+'/'+req[level]:'MAX';document.getElementById('used').textContent=field.length;document.getElementById('cap').textContent=level;const b=document.getElementById('bench');b.innerHTML='';for(let i=0;i<6;i++){const s=document.createElement('div');s.className='slot'+(bench[i]?' filled':'')+(selected===i?' selected':'');if(bench[i]){s.appendChild(face(bench[i]));const n=document.createElement('b');n.textContent=bench[i].n;s.appendChild(n);s.onpointerdown=e=>dragStart(e,i);s.onclick=()=>{selected=selected===i?-1:i;render()}}b.appendChild(s)}const sh=document.getElementById('shop');sh.innerHTML='';offers.forEach(t=>{const c=document.createElement('div');c.className='card';const p=document.createElement('div');p.className='portrait';p.appendChild(face(t));c.appendChild(p);const n=document.createElement('b');n.textContent=t.n;c.appendChild(n);const sm=document.createElement('small');sm.textContent='Class 1 • 2💰';c.appendChild(sm);const bt=document.createElement('button');bt.textContent='ซื้อ';bt.onclick=()=>{if(gold<2)return toast('ทองไม่พอ');if(bench.length>=6)return toast('Bench เต็ม');gold-=2;bench.push(t);render()};c.appendChild(bt);sh.appendChild(c)}const syn={Warrior:0,Ranger:0,Forest:0,Mage:0};[...bench,...field.map(x=>x.type)].forEach(t=>syn[t.role]++);document.getElementById('syn').innerHTML=Object.entries(syn).map(([k,v])=>`<div class="syn">${k} ${v}/2</div>`).join('');document.getElementById('team').innerHTML=field.length?field.map(u=>`<div class="member"><div class="mini"></div><span>${u.type.n}</span><div class="mbar"><i></i></div></div>`).join(''):'<div class="syn">ยังไม่มีฮีโร่</div>';drawBoard()}
function place(c,r){if(selected<0||!bench[selected])return;if(r<5)return toast('วางได้เฉพาะ 3 แถวล่าง');if(field.length>=level)return toast('จำนวนตัวเต็มตามเลเวล');if(field.some(u=>u.c===c&&u.r===r))return toast('ช่องนี้มีตัวอยู่แล้ว');const type=bench.splice(selected,1)[0];field.push({type,c,r});selected=-1;render()}
let drag=null,ghost=null;function dragStart(e,i){if(!bench[i]||battle)return;e.preventDefault();selected=i;drag=i;ghost=document.createElement('div');ghost.className='ghost';ghost.appendChild(face(bench[i]));document.body.appendChild(ghost);dragMove(e)}function dragMove(e){if(!ghost)return;ghost.style.left=e.clientX+'px';ghost.style.top=e.clientY+'px'}function dragEnd(e){if(drag===null)return;const p=screenToCell(e.clientX,e.clientY);if(p)place(p.c,p.r);ghost.remove();ghost=null;drag=null}addEventListener('pointermove',dragMove,{passive:false});addEventListener('pointerup',dragEnd);board.addEventListener('pointerup',e=>{if(drag===null){const p=screenToCell(e.clientX,e.clientY);if(p)place(p.c,p.r)}});
document.getElementById('buyXp').onclick=()=>{if(gold<4||level>=5)return;gold-=4;xp+=4;while(level<5&&xp>=req[level]){xp-=req[level];level++}render()};document.getElementById('refresh').onclick=()=>{if(gold<2)return;gold-=2;offersNew();render()};document.getElementById('start').onclick=()=>{if(!field.length||battle)return toast('ต้องวางฮีโร่ก่อน');battle=true;drawBoard();setTimeout(()=>{battle=false;gold+=5;offersNew();toast('ชนะ +5 ทอง');render()},2200/speed)};document.getElementById('speed').onclick=e=>{speed=speed===1?2:1;e.currentTarget.textContent='×'+speed};document.getElementById('reset').onclick=()=>drawBoard();offersNew();render();requestAnimationFrame(resize);
</script></body></html>
