<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Auto Battler 2.5D V2</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07120d;color:#f7e7ba;font-family:system-ui,sans-serif;touch-action:none}#game{position:fixed;inset:0;width:100%;height:100%;display:block;background:#102319}#ui{position:fixed;inset:0;pointer-events:none}.top{position:absolute;left:8px;right:8px;top:7px;display:flex;gap:6px;align-items:center}.pill,.btn{border:1px solid #9b7840;background:#17140fdf;color:#f9e3a1;border-radius:15px;padding:6px 9px;font-size:10px;font-weight:800}.btn{pointer-events:auto;border-radius:8px}.grow{flex:1}.side{position:absolute;top:52px;bottom:160px;width:94px;border:1px solid #806536;border-radius:10px;background:#12110ddb;padding:7px;overflow:hidden}.side.left{left:7px}.side.right{right:7px}.side h3{margin:0 0 7px;text-align:center;font-size:10px}.side div{font-size:8px;padding:5px 1px;border-bottom:1px solid #493a22}.bench{position:absolute;left:50%;bottom:100px;transform:translateX(-50%);display:grid;grid-template-columns:repeat(6,44px);gap:4px;padding:5px;border:1px solid #8a6c39;border-radius:9px;background:#15120edc;pointer-events:auto}.slot{width:44px;height:48px;border:1px solid #5c482b;border-radius:8px;background:#251d13;position:relative;overflow:hidden}.slot.filled{border-color:#d0a052}.slot.selected{box-shadow:0 0 0 2px #ffe178}.slot img{width:100%;height:100%;object-fit:contain}.slot b{position:absolute;bottom:0;left:0;right:0;background:#000b;font-size:7px;text-align:center}.shopbar{position:absolute;left:0;right:0;bottom:0;height:92px;background:#0d0b08ef;border-top:1px solid #70562e;display:grid;grid-template-columns:100px 1fr 100px;gap:5px;padding:5px}.round{pointer-events:auto;border:2px solid #98723a;border-radius:50%;background:radial-gradient(circle,#513817,#20150b);color:#ffe6a0;font-weight:900;font-size:10px}.shop{display:grid;grid-template-columns:repeat(5,minmax(55px,1fr));gap:4px}.card{pointer-events:auto;border:1px solid #80643a;border-radius:7px;background:#17191b;text-align:center;padding:3px;overflow:hidden}.card .pic{height:37px;border-radius:5px;background:#293b2e;display:grid;place-items:center;font-size:22px}.card b{display:block;font-size:8px;white-space:nowrap;overflow:hidden}.card small{font-size:7px}.card button{width:100%;border:0;border-radius:4px;background:#bd8b2c;font-size:8px;font-weight:900}.start{position:absolute;right:10px;bottom:99px;pointer-events:auto;border:1px solid #a77d37;border-radius:7px;background:#c18d2b;padding:7px 10px;font-weight:900;font-size:10px}.error{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);max-width:72%;padding:12px;border:1px solid #c28f46;border-radius:10px;background:#17130fed;text-align:center;font-size:12px;display:none}.error.show{display:block}@media(min-width:900px){.side{width:112px}.bench{grid-template-columns:repeat(6,52px)}.slot{width:52px;height:56px}}</style></head><body><canvas id="game"></canvas><div id="ui"><div class="top"><div class="pill">Lv.<b id="lv">1</b> EXP <b id="xp">0/4</b></div><div class="pill">💰 <b id="gold">3</b></div><div class="pill">👥 <b id="used">0</b>/<b id="cap">1</b></div><div class="grow"></div><button class="btn" id="speed">×1</button><button class="btn" id="reset">⌂</button></div><aside class="side left"><h3>SYNERGY</h3><div>⚔ Warrior 0/2</div><div>🏹 Ranger 0/2</div><div>🔮 Mage 0/2</div><div>🌲 Forest 0/2</div></aside><aside class="side right"><h3>TEAM</h3><div id="team">ยังไม่มีฮีโร่</div></aside><div class="bench" id="bench"></div><button class="start" id="start">เริ่มต่อสู้</button><div class="shopbar"><button class="round" id="buyXp">BUY EXP<br>4💰</button><div class="shop" id="shop"></div><button class="round" id="refresh">REFRESH<br>2💰</button></div><div class="error" id="error"></div></div><script>(function(){const err=document.getElementById('error');function showErr(t){err.textContent=t;err.classList.add('show')}function load(src,ok,fail){const s=document.createElement('script');s.src=src;s.onload=ok;s.onerror=fail;document.head.appendChild(s)}load('https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js',boot,()=>load('https://unpkg.com/three@0.128.0/build/three.min.js',boot,()=>{showErr('โหลด Three.js ไม่สำเร็จ จึงเปิดโหมดกระดานสำรอง');fallback()}));function fallback(){const c=document.getElementById('game'),x=c.getContext('2d');function draw(){c.width=innerWidth*devicePixelRatio;c.height=innerHeight*devicePixelRatio;x.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);x.fillStyle='#17341f';x.fillRect(0,0,innerWidth,innerHeight);const L=110,R=110,T=55,B=165,w=innerWidth-L-R,h=innerHeight-T-B;x.fillStyle='#66745c';x.fillRect(L,T,w,h);for(let r=0;r<8;r++)for(let col=0;col<8;col++){x.fillStyle=(r+col)%2?'#758369':'#62725d';x.fillRect(L+col*w/8,T+r*h/8,w/8-1,h/8-1)}}addEventListener('resize',draw);draw();setupUI()}function boot(){try{const canvas=document.getElementById('game'),renderer=new THREE.WebGLRenderer({canvas,antialias:true});renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));renderer.shadowMap.enabled=true;const scene=new THREE.Scene();scene.background=new THREE.Color(0x102319);const camera=new THREE.PerspectiveCamera(42,1,.1,100);camera.position.set(8.8,11.5,12.8);camera.lookAt(0,0,.5);scene.add(new THREE.HemisphereLight(0xd9f2d1,0x24351f,1.4));const sun=new THREE.DirectionalLight(0xffedbf,1.5);sun.position.set(-6,12,7);sun.castShadow=true;scene.add(sun);const ground=new THREE.Mesh(new THREE.CircleGeometry(13,48),new THREE.MeshStandardMaterial({color:0x315b38,roughness:1}));ground.rotation.x=-Math.PI/2;ground.position.y=-.15;ground.receiveShadow=true;scene.add(ground);const board=new THREE.Group();scene.add(board);const TILE=1.08;for(let r=0;r<8;r++)for(let col=0;col<8;col++){const m=new THREE.Mesh(new THREE.BoxGeometry(TILE*.97,.12,TILE*.97),new THREE.MeshStandardMaterial({color:(r+col)%2?0x6d7c63:0x7c896d,roughness:1}));m.position.set((col-3.5)*TILE,0,(r-3.5)*TILE);m.receiveShadow=true;board.add(m)}for(let i=0;i<18;i++){const a=i/18*Math.PI*2,r=9.5+(i%3)*.45;const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.16,.24,1.4,7),new THREE.MeshStandardMaterial({color:0x573820}));trunk.position.set(Math.cos(a)*r,.7,Math.sin(a)*r);const crown=new THREE.Mesh(new THREE.ConeGeometry(.75,1.7,8),new THREE.MeshStandardMaterial({color:i%2?0x2c6939:0x3c7c44}));crown.position.set(trunk.position.x,1.8,trunk.position.z);scene.add(trunk,crown)}function resize(){renderer.setSize(innerWidth,innerHeight,false);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix()}addEventListener('resize',resize);resize();(function anim(){requestAnimationFrame(anim);renderer.render(scene,camera)})();setupUI()}catch(e){showErr('WebGL เริ่มทำงานไม่สำเร็จ: '+e.message);fallback()}}function setupUI(){const heroes=[['Swordman','⚔️'],['Archer','🏹'],['Acolyte','✨'],['Mage','🔮']],bench=[],offers=[];let gold=3,level=1,xp=0,selected=-1;const q=id=>document.getElementById(id);function refill(){offers.length=0;for(let i=0;i<5;i++)offers.push(heroes[Math.floor(Math.random()*heroes.length)])}function render(){q('gold').textContent=gold;q('lv').textContent=level;q('xp').textContent=level<5?xp+'/'+({1:4,2:8,3:12,4:16}[level]):'MAX';q('cap').textContent=level;q('used').textContent=0;const b=q('bench');b.innerHTML='';for(let i=0;i<6;i++){const d=document.createElement('div');d.className='slot'+(bench[i]?' filled':'')+(selected===i?' selected':'');if(bench[i]){d.innerHTML='<div style="font-size:28px;text-align:center;padding-top:5px">'+bench[i][1]+'</div><b>'+bench[i][0]+'</b>';d.onclick=()=>{selected=selected===i?-1:i;render()}}b.appendChild(d)}const s=q('shop');s.innerHTML='';offers.forEach(h=>{const d=document.createElement('div');d.className='card';d.innerHTML='<div class="pic">'+h[1]+'</div><b>'+h[0]+'</b><small>Class 1 • 2💰</small><button>ซื้อ</button>';d.querySelector('button').onclick=()=>{if(gold>=2&&bench.length<6){gold-=2;bench.push(h);render()}};s.appendChild(d)});q('team').textContent=bench.length?bench.map(x=>x[0]).join(', '):'ยังไม่มีฮีโร่'}q('refresh').onclick=()=>{if(gold>=2){gold-=2;refill();render()}};q('buyXp').onclick=()=>{if(gold>=4&&level<5){gold-=4;xp+=4;const need={1:4,2:8,3:12,4:16};while(level<5&&xp>=need[level]){xp-=need[level];level++}render()}};q('start').onclick=()=>{if(!bench.length)showErr('ซื้อฮีโร่ก่อนเริ่มต่อสู้');else showErr('กระดานเรนเดอร์แล้ว ระบบวางตัวจะเพิ่มในขั้นถัดไป')};refill();render()}})();</script></body></html>
