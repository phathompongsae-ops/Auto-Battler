name: Agent Task Queue Validation

on:
  pull_request:
    paths:
      - 'data/agent-tasks/**'
      - 'data/design/agent-task-contract-v1.json'
      - 'tools/validate-agent-task-queue-v1.mjs'
      - '.github/workflows/agent-task-queue-validation.yml'
  push:
    paths:
      - 'data/agent-tasks/**'
      - 'data/design/agent-task-contract-v1.json'
      - 'tools/validate-agent-task-queue-v1.mjs'
      - '.github/workflows/agent-task-queue-validation.yml'

permissions:
  contents: read

jobs:
  validate-agent-task-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate agent task queue
        run: node tools/validate-agent-task-queue-v1.mjs
