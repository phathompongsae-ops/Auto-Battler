<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Battler — Combat Next</title>
<style>
html,body{margin:0;min-height:100%;background:#14100c;color:#f0e6c8;font-family:monospace;display:flex;align-items:center;justify-content:center;text-align:center}
#status{padding:28px;max-width:680px;line-height:1.7}
.error{color:#ff9d8d}
</style>
</head>
<body>
<div id="status">กำลังโหลดระบบต่อสู้รุ่นปรับปรุง…</div>
<script>
(async function bootCombatNext(){
  const status = document.getElementById('status');
  try {
    let source = await fetch('autochess.html', { cache:'no-store' }).then((res) => {
      if (!res.ok) throw new Error('โหลด autochess.html ไม่สำเร็จ: HTTP ' + res.status);
      return res.text();
    });

    const applied = [];
    function replaceRequired(label, pattern, replacement) {
      const before = source;
      source = source.replace(pattern, replacement);
      if (source === before) throw new Error('หาโค้ดสำหรับแพตช์ไม่พบ: ' + label);
      applied.push(label);
    }

    replaceRequired(
      'Beast Lord ระยะกลาง',
      /beastlord:\s*\{ title:'Beast Lord',\s+sprite:'BeastLord',\s+cost:4, hp:155, pAtk:15, atkSpeed:1\.0, range:1, moveSpeed:2\.1, trait:'none' \}/,
      "beastlord:   { title:'Beast Lord',   sprite:'BeastLord',   cost:4, hp:155, pAtk:15, atkSpeed:1.0, range:3, moveSpeed:2.1, trait:'none' }"
    );

    replaceRequired(
      'สถานะ target/threat ของยูนิต',
      /maxHp: cfg\.hp, alive: true, atkCooldown: 0,\n\s*moving: false, moveFrom: null, moveTo: null, moveT: 0,/,
      `maxHp: cfg.hp, alive: true, atkCooldown: 0,
    target: null, targetRecheck: 0,
    threat: cfg.threat || defaultThreat(cfg),
    moving: false, moveFrom: null, moveTo: null, moveT: 0,`
    );

    replaceRequired(
      'รีเซ็ต target ระหว่างด่าน',
      /u\.deathT = undefined;\n\s*u\.animState = 'idle'; u\.animFrame = 0;/,
      `u.deathT = undefined;
  u.target = null; u.targetRecheck = 0;
  u.animState = 'idle'; u.animFrame = 0;`
    );

    const combatBlock = String.raw`function gridDist(a,b) { return Math.abs(a.c-b.c)+Math.abs(a.r-b.r); }
function combatDist(a,b) { return Math.max(Math.abs(a.c-b.c), Math.abs(a.r-b.r)); }

function defaultThreat(cfg) {
  if (cfg.sprite === 'BladeMaster') return 1.55;
  if (cfg.sprite === 'BeastLord') return 1.35;
  if (cfg.sprite === 'Duelist') return 1.15;
  if (cfg.sprite === 'Warden' || cfg.sprite === 'Golem' || cfg.sprite === 'ChampionBig') return 1.5;
  if ((cfg.range || 1) > 1) return 0.8;
  return 1.0;
}

function attackTiles(target, u) {
  if (u.range > 1) return [{ c:target.c, r:target.r }];
  const result = [];
  for (const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]) {
    const c=target.c+dc, r=target.r+dr;
    if (c<0||r<0||c>=GRID||r>=GRID) continue;
    if (!occupied.has(key(c,r)) || (c===u.c && r===u.r)) result.push({c,r});
  }
  return result;
}

function pathToAttackPosition(u, target) {
  if (combatDist(u,target) <= u.range) return [];
  let best = null;
  for (const tile of attackTiles(target,u)) {
    const path = astar(u.c,u.r,tile.c,tile.r,key(u.c,u.r));
    if (path && (!best || path.length < best.length)) best = path;
  }
  return best;
}

function targetPriority(u, o, pathLen) {
  const hpPct = o.hp / o.maxHp;
  const threatBonus = (o.threat || 1) * 0.7;
  const assassinBacklineBonus = u.sprite === 'ShadowAssassin'
    ? (o.team === 'player' ? o.r : (GRID - 1 - o.r)) * 0.45
    : 0;
  return pathLen - threatBonus - assassinBacklineBonus + hpPct * 0.15;
}

function selectTarget(u) {
  const candidates = [];
  for (const o of units) {
    if (!o.alive || o.team===u.team) continue;
    const path = pathToAttackPosition(u,o);
    if (path === null) continue;
    candidates.push({
      unit:o,
      pathLen:path.length,
      priority:targetPriority(u,o,path.length),
      hpPct:o.hp/o.maxHp,
      row:o.r,
      col:o.c,
    });
  }
  candidates.sort((a,b)=>a.priority-b.priority || a.pathLen-b.pathLen || a.hpPct-b.hpPct || a.row-b.row || a.col-b.col);
  return candidates.length ? candidates[0].unit : null;
}

function getLockedTarget(u, dt) {
  u.targetRecheck = Math.max(0, (u.targetRecheck||0)-dt);
  const invalid = !u.target || !u.target.alive || u.target.team===u.team || pathToAttackPosition(u,u.target)===null;
  if (invalid) {
    u.target = selectTarget(u);
    u.targetRecheck = 0.4;
  } else if (u.targetRecheck<=0) {
    const challenger = selectTarget(u);
    if (challenger && challenger !== u.target) {
      const oldPath = pathToAttackPosition(u,u.target);
      const newPath = pathToAttackPosition(u,challenger);
      if (oldPath === null || (newPath && newPath.length + 2 < oldPath.length)) u.target = challenger;
    }
    u.targetRecheck = 0.4;
  }
  return u.target;
}

function stepToward(u, target) {
  const path = pathToAttackPosition(u,target);
  if (!path || path.length===0) return false;
  const next=path[0], nk=key(next.c,next.r);
  if (occupied.has(nk)) return false;
  occupied.delete(key(u.c,u.r)); occupied.add(nk);
  u.moving=true; u.moveT=0; u.moveFrom={c:u.c,r:u.r}; u.moveTo=next;
  u.body.scale.x = (next.c<u.c)?-1:(next.c>u.c?1:u.body.scale.x);
  return true;
}

const projectiles = [];
function projectileColor(u) {
  if (u.heroKey==='frostweaver') return 0x8edbff;
  if (u.heroKey==='archmage'||u.heroKey==='summoner') return 0xb48cff;
  if (u.heroKey==='trickster') return 0x62e0bd;
  if (u.heroKey==='sniper') return 0xe8f4ff;
  if (u.heroKey==='beastlord') return 0x91cf68;
  return 0xffd37a;
}

function dealDamage(u,target) {
  if (!target || !target.alive) return;
  const buffs = u.team==='player' ? getTeamBuffs() : null;
  let dmg = applyTrait(u,target,u.pAtk);
  if (buffs) {
    dmg *= (1 + buffs.dmgPct/100);
    const effArmor = Math.max(0,(target.armor||0)-buffs.armorPenPct);
    dmg *= (1-effArmor/100);
  } else if (target.armor) dmg *= (1-target.armor/100);
  target.hp -= dmg;
  target.body.material.color.set(0xff8866);
  setTimeout(()=>target.alive&&target.body.material.color.set(0xffffff),80);
  target.hpBar.scale.x=Math.max(0,target.hp/target.maxHp);
  target.hpBar.position.x=-0.36*(1-target.hpBar.scale.x);
  if (target.hp<=0) {
    target.alive=false; target.target=null;
    occupied.delete(key(target.c,target.r)); target.deathT=0;
  }
}

function launchProjectile(u,target) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.08,8,8),
    new THREE.MeshBasicMaterial({color:projectileColor(u)})
  );
  mesh.position.copy(u.group.position); mesh.position.y=u.halfH;
  scene.add(mesh); projectiles.push({mesh,source:u,target,speed:5.5});
}

function clearProjectiles() {
  for (const p of projectiles) scene.remove(p.mesh);
  projectiles.length = 0;
}

function updateProjectiles(dt) {
  for (let i=projectiles.length-1;i>=0;i--) {
    const p=projectiles[i];
    if (!p.source.alive || !p.target || !p.target.alive) {
      scene.remove(p.mesh); projectiles.splice(i,1); continue;
    }
    const dest=p.target.group.position.clone(); dest.y=p.target.halfH;
    const delta=dest.sub(p.mesh.position), step=p.speed*dt;
    if (delta.length()<=step) {
      dealDamage(p.source,p.target); scene.remove(p.mesh); projectiles.splice(i,1);
    } else p.mesh.position.add(delta.normalize().multiplyScalar(step));
  }
}

function updateUnit(u, dt) {
  if (!u.alive) return;
  if (u.moving) {
    u.moveT += dt*u.moveSpeed;
    if (u.moveT>=1) { u.moveT=1; u.moving=false; u.c=u.moveTo.c; u.r=u.moveTo.r; }
    const a=gridToWorld(u.moveFrom.c,u.moveFrom.r), b=gridToWorld(u.moveTo.c,u.moveTo.r);
    u.group.position.lerpVectors(a,b,u.moveT);
    u.body.position.y = u.halfH + Math.abs(Math.sin(u.moveT*Math.PI*2))*0.06;
    updateAnim(u,dt); return;
  }
  u.body.position.y = u.halfH;
  const target = getLockedTarget(u,dt);
  if (!target) { updateAnim(u,dt); return; }
  const d = combatDist(u,target);
  if (d<=u.range) {
    u.atkCooldown -= dt;
    if (u.atkCooldown<=0) {
      const buffs = u.team==='player' ? getTeamBuffs() : null;
      u.atkCooldown = 1/(u.atkSpeed * (1 + (buffs ? buffs.atkSpeedPct/100 : 0)));
      u.animState='attack'; u.animTimer=0;
      if (u.range>1) launchProjectile(u,target);
      else dealDamage(u,target);
      const dir = gridToWorld(target.c,target.r).sub(u.group.position).normalize().multiplyScalar(0.12);
      u.body.position.x += dir.x;
      setTimeout(()=>{ if (u.alive) u.body.position.x=0; }, 90);
    }
    u.body.scale.x = (gridToWorld(target.c,target.r).x < u.group.position.x) ? -1 : 1;
  } else if (!stepToward(u,target)) {
    u.target=null; u.targetRecheck=0;
  }
  updateAnim(u, dt);
}
`;

    replaceRequired(
      'ระบบ targeting/projectile/threat',
      /function gridDist\(a,b\)[\s\S]*?function updateUnit\(u, dt\) \{[\s\S]*?\n\}\n\n(?=\/\/ ============================================================\n\/\/ UI)/,
      combatBlock + '\n'
    );

    replaceRequired(
      'ล้าง projectile เมื่อจบด่าน',
      /function clearEnemies\(\) \{\n\s*units\.filter\(u => u\.team==='enemy'\)\.forEach\(removeUnit\);\n\}/,
      `function clearEnemies() {
  clearProjectiles();
  units.filter(u => u.team==='enemy').forEach(removeUnit);
}`
    );

    replaceRequired(
      'อัปเดต projectile ใน game loop',
      /waveTimer \+= dt;\n\s*for \(const u of units\) updateUnit\(u, dt\);/,
      `waveTimer += dt;
    updateProjectiles(dt);
    for (const u of units) updateUnit(u, dt);`
    );

    source = source.replace(
      '<title>Auto Battler — โหมด Auto Chess</title>',
      '<title>Auto Battler — Combat Next</title>'
    );
    source = source.replace(
      '<div class="pill" id="phaseLabel">เตรียมทีม</div>',
      '<div class="pill" id="phaseLabel">เตรียมทีม</div><div class="pill" title="Target lock + threat + projectile">⚙ Combat Next</div>'
    );

    console.info('Combat Next patches:', applied);
    document.open();
    document.write(source);
    document.close();
  } catch (err) {
    console.error(err);
    status.className = 'error';
    status.textContent = 'เปิดเกมรุ่นปรับปรุงไม่สำเร็จ: ' + err.message;
  }
})();
</script>
</body>
</html>
