<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Auto Battler Visual V6</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07110d;font-family:system-ui,sans-serif;color:#f5e5b8}#app{position:fixed;inset:0;background:radial-gradient(circle at 50% 45%,#657f4e,#1b3123 60%,#08110d)}#top{position:absolute;left:8px;right:8px;top:6px;display:flex;gap:7px;z-index:10}.pill{padding:8px 12px;border:2px solid #8b6d3f;border-radius:18px;background:#17140fdc;font-weight:800;font-size:12px}.grow{flex:1}.btn{border:2px solid #8b6d3f;border-radius:10px;background:#18150f;color:#f6df9d;padding:7px 10px;font-weight:900}#left,#right{position:absolute;top:54px;bottom:174px;width:128px;background:#10100dde;border:2px solid #795e36;border-radius:12px;padding:8px;z-index:8}#left{left:8px}#right{right:8px}.syn,.member{font-size:10px;padding:6px 2px;border-bottom:1px solid #4f3d24}.member{display:flex;gap:6px;align-items:center}.avatar{width:28px;height:28px;border-radius:6px;background:#30472f}.bar{height:5px;background:#2b261d;border-radius:4px;overflow:hidden;flex:1}.bar i{display:block;height:100%;background:#5bd36d}#arena{position:absolute;left:142px;right:142px;top:54px;bottom:178px;background:linear-gradient(135deg,#536f43,#2f4932);border:10px solid #777b5f;border-radius:24px;box-shadow:0 18px 30px #0008}#grid{position:absolute;inset:5%;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);transform:perspective(900px) rotateX(47deg)}.cell{border:1px solid #d3c89b55;background:#435e3f66}.cell.player{box-shadow:inset 0 0 0 2px #6fe39366}.cell.over{background:#9ac66d99;box-shadow:inset 0 0 0 3px #ffe37a}.unit{position:absolute;left:10%;bottom:5%;width:80%;height:115%;transform:rotateX(-47deg);transform-origin:bottom center;border-radius:45% 45% 35% 35%;background:linear-gradient(#6f8cd6,#273d69);box-shadow:0 6px 8px #0008;animation:idle 1s ease-in-out infinite alternate}.unit.enemy{background:linear-gradient(#8d6637,#3a2416)}@keyframes idle{to{transform:rotateX(-47deg) translateY(-4px)}}#bench{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);display:grid;grid-template-columns:repeat(6,54px);gap:5px;padding:6px;border:2px solid #8c6d3d;border-radius:11px;background:#14110ddd;z-index:12}.slot{width:54px;height:58px;border:2px solid #5d492b;border-radius:9px;background:#241d13;position:relative}.slot.filled{border-color:#bf944d}.slot.selected{border-color:#ffe16f;box-shadow:0 0 13px #ffd75f}.piece{position:absolute;inset:6px;border-radius:50% 50% 35% 35%;background:linear-gradient(#7b99e8,#2d466f)}.slot b{position:absolute;left:1px;right:1px;bottom:0;background:#000b;text-align:center;font-size:8px}#bottom{position:absolute;left:0;right:0;bottom:0;height:92px;display:flex;align-items:stretch;background:#0b0a08ee;border-top:2px solid #6e552f;padding:5px 145px}.shop{display:grid;grid-template-columns:repeat(5,minmax(70px,1fr));gap:5px;width:100%;max-width:760px;margin:auto}.card{border:2px solid #82683c;border-radius:9px;background:#17191c;color:#f1dfb2;text-align:center;padding:4px}.portrait{height:46px;border-radius:7px;background:linear-gradient(#496546,#223628)}.card button{border:0;border-radius:12px;background:#c39431;padding:4px 10px;font-weight:900}#buyExp,#reroll{position:absolute;bottom:10px;width:110px;height:70px;border-radius:50%;border:3px solid #8d6c32;background:radial-gradient(circle,#4a3518,#20170d);color:#ffe9a9;font-weight:900;z-index:20}#buyExp{left:14px}#reroll{right:14px}#start{position:absolute;right:16px;bottom:88px;z-index:20;border:2px solid #ad8238;border-radius:10px;background:#b98a2c;padding:8px 16px;font-weight:900}.ghost{position:fixed;width:58px;height:68px;border-radius:50% 50% 35% 35%;background:linear-gradient(#7b99e8,#2d466f);pointer-events:none;z-index:99;transform:translate(-50%,-65%)}@media(max-width:850px){#left,#right{width:104px}#arena{left:112px;right:112px}#bench{grid-template-columns:repeat(6,44px)}.slot{width:44px;height:48px}#bottom{padding-left:112px;padding-right:112px}}</style></head><body><div id="app"><div id="top"><div class="pill">Lv.<b id="level">1</b> EXP <b id="exp">0/4</b></div><div class="pill">💰 <b id="gold">3</b></div><div class="pill">👥 <b id="used">0</b>/<b id="cap">1</b></div><div class="grow"></div><button class="btn">×1</button><button class="btn">AUTO</button><button class="btn">⚙</button></div><aside id="left"><b>SYNERGY</b><div class="syn">⚔ Warrior 1/2</div><div class="syn">🏹 Ranger 0/2</div><div class="syn">🔮 Mage 0/2</div><div class="syn">🌲 Forest 1/2</div></aside><aside id="right"><b>TEAM</b><div id="team"></div></aside><div id="arena"><div id="grid"></div></div><div id="bench"></div><button id="buyExp">BUY EXP<br>4💰</button><button id="reroll">REFRESH<br>2💰</button><button id="start">เริ่มต่อสู้</button><div id="bottom"><div class="shop" id="shop"></div></div></div><script>const H=['Swordman','Archer','Acolyte','Mage'];let gold=3,level=1,xp=0,bench=[],field=[],sel=-1,offers=[];const req={1:4,2:8,3:12,4:16},grid=document.querySelector('#grid'),benchEl=document.querySelector('#bench'),shop=document.querySelector('#shop');function cell(c,r){return grid.children[r*8+c]}function draw(){grid.innerHTML='';for(let r=0;r<8;r++)for(let c=0;c<8;c++){let d=document.createElement('div');d.className='cell'+(r>=5?' player':'');d.dataset.c=c;d.dataset.r=r;d.onclick=()=>place(c,r);grid.appendChild(d)}field.forEach((u,i)=>{let d=document.createElement('div');d.className='unit';d.onclick=e=>{e.stopPropagation();if(bench.length<6){bench.push(field.splice(i,1)[0]);render()}};cell(u.c,u.r).appendChild(d)});benchEl.innerHTML='';for(let i=0;i<6;i++){let s=document.createElement('div');s.className='slot'+(bench[i]?' filled':'')+(sel===i?' selected':'');if(bench[i]){s.innerHTML='<div class="piece"></div><b>'+bench[i]+'</b>';s.onpointerdown=e=>dragStart(e,i);s.onclick=()=>{sel=sel===i?-1:i;draw()}}benchEl.appendChild(s)}shop.innerHTML='';offers.forEach(h=>{let c=document.createElement('div');c.className='card';c.innerHTML='<div class="portrait"></div><b>'+h+'</b><br><small>Class 1 • 2💰</small><br><button>ซื้อ</button>';c.querySelector('button').onclick=()=>{if(gold>=2&&bench.length<6){gold-=2;bench.push(h);render()}};shop.appendChild(c)});document.querySelector('#gold').textContent=gold;document.querySelector('#level').textContent=level;document.querySelector('#exp').textContent=level<5?xp+'/'+req[level]:'MAX';document.querySelector('#used').textContent=field.length;document.querySelector('#cap').textContent=level;let t=document.querySelector('#team');t.innerHTML='';[...field,...bench].forEach((u,i)=>{t.innerHTML+='<div class="member"><div class="avatar"></div>'+u+'<div class="bar"><i style="width:'+(100-i*8)+'%"></i></div></div>'})}function render(){draw()}function place(c,r){if(sel<0||!bench[sel]||r<5||field.length>=level||field.some(x=>x.c===c&&x.r===r))return;let u=bench.splice(sel,1)[0];field.push({name:u,c,r});sel=-1;render()}let drag=null,g=null;function target(x,y){let R=grid.getBoundingClientRect();if(x<R.left||x>R.right||y<R.top||y>R.bottom)return null;let c=Math.floor((x-R.left)/R.width*8),r=Math.floor((y-R.top)/R.height*8);return r>=5?{c,r}:null}function dragStart(e,i){if(!bench[i])return;e.preventDefault();sel=i;drag=i;g=document.createElement('div');g.className='ghost';document.body.appendChild(g);move(e)}function move(e){if(!g)return;g.style.left=e.clientX+'px';g.style.top=e.clientY+'px';document.querySelectorAll('.over').forEach(x=>x.classList.remove('over'));let t=target(e.clientX,e.clientY);if(t)cell(t.c,t.r).classList.add('over')}function end(e){if(drag===null)return;let t=target(e.clientX,e.clientY);if(t)place(t.c,t.r);g.remove();g=null;drag=null;document.querySelectorAll('.over').forEach(x=>x.classList.remove('over'))}addEventListener('pointermove',move);addEventListener('pointerup',end);document.querySelector('#buyExp').onclick=()=>{if(gold>=4&&level<5){gold-=4;xp+=4;while(level<5&&xp>=req[level]){xp-=req[level];level++}render()}};document.querySelector('#reroll').onclick=()=>{if(gold>=2){gold-=2;offers=Array.from({length:5},()=>H[Math.floor(Math.random()*H.length)]);render()}};document.querySelector('#start').onclick=()=>{if(!field.length)return;for(let i=0;i<Math.min(3,level+1);i++){let d=document.createElement('div');d.className='unit enemy';cell(2+i*2,1).appendChild(d)}setTimeout(()=>{gold+=5;offers=Array.from({length:5},()=>H[Math.floor(Math.random()*H.length)]);render()},1600)};offers=Array.from({length:5},()=>H[Math.floor(Math.random()*H.length)]);render();</script></body></html>
